<title>justif — publication-grade text justification for the web</title>
<link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
<script>
  // Restore appearance before CSS is parsed so explicit light/dark choices
  // never flash through the system default on reload.
  try {
    const theme = JSON.parse(localStorage.getItem("justif-demo-params") ?? "null")?.theme;
    if (["system", "light", "dark"].includes(theme)) {
      document.documentElement.dataset.theme = theme;
    }
  } catch { /* corrupt or unavailable storage: keep the system default */ }

  // Keep the first paint on final font metrics. The timeout is only a
  // fail-safe for a broken asset or disabled module script.
  document.documentElement.classList.add("fonts-loading");
  window.fontGateTimeout = setTimeout(() => {
    document.documentElement.classList.remove("fonts-loading");
  }, 3000);
</script>

  :root {
    color-scheme: light;
    --ink: #000;
    --paper: #fff;
    --muted: #000;
    /* Ink share of the code-chip/pre gray. Themed because equal OkLab
       lightness steps read weaker on a dark ground: 4.5% on white gives
       chip-vs-paper dL ~ 0.034, and dark mode needs ~2x that (7% ->
       dL ~ 0.068, rgb(34,34,31) on #121210) to look equally distinct —
       the same reason dark-elevation overlays use larger percentages. */
    --chip-mix: 4.5%;
    --hairline: #000;
    --accent: #a23b2e; /* madder red: loose spaces, worse metrics — NOT general UI */
    --tight: #2e5f8a;  /* tight spaces */
    --gap-highlight: #000;
    --good: #2a6b46;
    --float-shadow: rgb(0 0 0 / 0.16);
    --scroll-shadow: rgb(0 0 0 / 0.28);
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --ink: #f2f0ea;
    --paper: #121210;
    --muted: #d4d0c7;
    --chip-mix: 7%;
    --hairline: #817d75;
    --accent: #e17a6d;
    --tight: #73aee0;
    --gap-highlight: #fff;
    --good: #72bd8b;
    --float-shadow: rgb(0 0 0 / 0.55);
    --scroll-shadow: rgb(255 255 255 / 0.2);

  /* ── The comparison spread ────────────────────────────────── */
  .panes {
    display: flex;
    align-items: flex-start;
    gap: 3rem;
    flex-wrap: nowrap;
    /* Break out of the body column to the full window; columns wider than
       the window scroll sideways. Centering via auto margins on the outer
       panes (justify-content: center would clip the left edge of
       overflowing content beyond scroll reach). */
    width: 100vw;
    margin-left: calc(50% - 50vw);
    box-sizing: border-box;
    padding: 0 1.5rem 0.5rem;
    overflow-x: auto;
    margin-top: 1.2rem;
  }
  .pane { flex: 0 0 auto; }
  @media (max-width: 1100px) {
    .panes { gap: 1.5rem; }
  }
  .pane:first-child { margin-left: auto; }
  .pane:last-child { margin-right: auto; }
  /* Flicker comparison (A/B): both renderings occupy the same position and
     alternate — human vision spots change far better than static
     difference. The browser pane is absolutely stacked over the justif
     pane; a measured pass equalizes paragraph tops so intra-paragraph
     drift never accumulates down the page. */
  body.flicker-mode .panes {
    display: block;
    position: relative;
    width: auto;
    margin-left: 0;
    padding: 0 0 0.5rem;
    overflow-x: visible;
  }
  body.flicker-mode .pane { margin: 0 auto; width: fit-content; }
  body.flicker-mode .pane:first-child {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;
    margin: 0;
    visibility: hidden;
  }
  body.flicker-mode.show-browser .pane:first-child { visibility: visible; }
  body.flicker-mode.show-browser .pane:last-child { visibility: hidden; }
  /* Squint test: blur collapses text into gray "color" — uneven spacing
     reads as blotches and rivers as white channels. */
  body.blur-mode .article { filter: blur(2.5px); }
  .pane h2 {
    margin: 0 0 1.2rem;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 500;
    font-variant: small-caps;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .article {
    position: relative;
    /* Font lives on the article so the em-based measure is in text ems. */
    font-family: var(--demo-family, "Junicode"), Georgia, serif;
    font-size: 16px;
    width: min(var(--measure, 26em), calc(100vw - 2.75rem));
    /* Ruler space is always reserved (transparent) so toggling the rulers
       never shifts layout — only the color changes. */
    border-left: 1px solid transparent;
    border-right: 1px solid transparent;
  }
  /* Margin truth lines (toggle): protruded glyphs visibly cross them. */
  body.rulers .article { border-color: var(--ink); }
  .article p {
    /* Hang headroom: engines can fail to repaint ink painted outside an
       element's box (protruded punctuation flickered at paragraph starts
       under containment; the padding is kept as general repaint
       robustness). Hangs paint INSIDE the box; the negative margins
       compensate exactly, so text position and the measured content
       width are unchanged. */
    padding: 0 0.75em;
    margin: 0 -0.75em 1em;
    line-height: 1.45;
    text-align: justify; /* pre-enhancement fallback so there's no flash */
  }
  .native p {
    -webkit-hyphens: auto; /* older Safari */
    hyphens: auto;
    /* Match justif's hyphenation minima (word ≥ 5, left 2, right 3) so
       neither engine is allowed breaks the other isn't. */
    hyphenate-limit-chars: 5 2 3;
  }
  /* Optical margin alignment where the browser supports it (Safari) — but
     only while justif is also hanging punctuation: with the option off (or
     protrusion off entirely) the comparison must not show WebKit hanging
     while justif doesn't. Synced by syncHangPunct(). */
  body.native-hang .native p {
    hanging-punctuation: first allow-end last;
  }

  /* No content-visibility anywhere: real-Safari skip/render transitions
     shifted the page in ways no placeholder scheme fully cured (see the
     project log for the full elimination trail). Width drags on very long
     samples therefore pay a full relayout per step in Safari (~150ms on
     the 300-paragraph stress sample; typical articles stay smooth) —
     chosen deliberately over layout shift. The hang-headroom padding on
     .article p stays: it also guards against ink-repaint bugs and costs
     nothing. */
  .native.pretty p { text-wrap: pretty; }
  /* True small caps. Fonts whose smcp lives in a companion "SC" family
     (IM Fell, Vollkorn) get it via --sc-family; everything else uses
     font-variant-caps (true smcp when the font has it — Junicode — and
     honest synthesis when it doesn't). */
  .article .smcp { font-variant-caps: small-caps; }
  body.sc-family .article .smcp {
    font-family: var(--sc-family), var(--demo-family, "Junicode"), serif;
    font-variant-caps: normal;
  }
  /* Nothing inside the columns is colored: the sample hyperlink inherits. */
  .article a { color: inherit; text-decoration: underline; }
  .article code {
    --code-chip: color-mix(in srgb, var(--ink) var(--chip-mix), var(--paper));
    font-family: "Courier Prime", ui-monospace, Menlo, Consolas, "DejaVu Sans Mono", monospace;
    /* Courier Prime's small typewriter body sits at 95% so inline code
       matches the serif's optical size and weight. */
    font-size: 0.95em;
    font-weight: normal;
    -webkit-hyphens: none;
    hyphens: none;
    /* The one exception to the black-and-white rule: a gray chip marks
       code. The side padding is REAL layout width — justif models inline
       padding/border by folding it into the chip's first/last box — and
       box-decoration-break stays slice (the initial value; clone would
       bail the paragraph to native), so a chip wrapped across lines
       opens at the break like any sliced inline box. */
    background: var(--code-chip);
    border-radius: 4px;
    padding: 0 0.3em;
  }
  .article kbd {
    font-family: "Courier Prime", ui-monospace, Menlo, Consolas, "DejaVu Sans Mono", monospace;
    font-size: 0.85em;
    font-weight: normal;
    background: var(--paper);
    border: 1px solid color-mix(in srgb, var(--ink) 35%, var(--paper));
    /* The keycap look: a slightly heavier bottom edge. Vertical borders
       and padding don't affect inline layout, so only the 1px sides are
       modeled. The top padding recenters the glyphs: caps leave the
       font's descent space empty below them, so the bare content box
       read bottom-heavy (ink 3.3px from the top, 6.9px from the bottom);
       with it, the leftover difference is exactly the heavier bottom
       edge. */
    border-bottom-width: 2.5px;
    border-radius: 4px;
    padding: 0.15em 0.35em 0;
    /* A keycap never splits across lines; justif honors inline nowrap
       (no break opportunity inside, spaces keep their justification
       flex). The 1px borders are modeled like the code chip's padding. */
    white-space: nowrap;
    -webkit-hyphens: none;
    hyphens: none;
  }
  /* Mac key symbols (⌘ ⌥ ⇧ …) inside keycaps: Courier Prime lacks them,
     and the engines' Menlo/Monaco fallback draws ⌘ floating well above the
     baseline. An explicit run in Helvetica Neue/Arial seats the symbol —
     and, as an ordinary inline font change, justif measures it in exactly
     the font it renders with (a unicode-range face would not reach the
     measuring canvas in every engine). */
  .article kbd .key-sym {
    font-family: "Helvetica Neue", Arial, sans-serif;
    /* Helvetica Neue draws ⌘ to ~0.74em where Courier Prime's caps reach
       ~0.58em; scale the symbol to the keycap letters' cap height. */
    font-size: 0.78em;
  }
  /* Protrusion uses a negative margin on the final generated segment. That
     shortens the parent code fragment's decoration box while its glyph still
     paints into the margin. Repaint the same opaque chip on the segment so
     the background follows the glyph without changing layout width. Kept
     SQUARE: it only ever shows where it extends past the sliced clone edge
     (a chip wrapped mid-element, its hyphen hanging into the margin), and
     box-decoration-break: slice keeps those break edges square — a rounded
     corner there would disagree with the flush square edge that starts the
     chip's next fragment. */
  .article p code .justif-seg {
    background: var(--code-chip);
  }
  /* The block container already provides the chip; don't double-tint
     (or double-indent). */
  .article pre code {
    background: none;
    padding: 0;
  }
  /* When the main font is itself monospace, inline code and keycaps just
     inherit (the chip background still marks them). */
  body.mono-body .article code,
  body.mono-body .article kbd {
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
  }
  .article pre {
    margin: 0 0 1em;
    padding: 0.65em 0.9em;
    font-size: 0.8em;
    line-height: 1.55;
    text-align: left;
    background: color-mix(in srgb, var(--ink) var(--chip-mix), transparent);
    border-radius: 4px;
    overflow-x: auto;
  }
  .article pre code { font-size: inherit; }

  .gapmark {
    position: absolute;
    background: transparent;
  }
  .gapmark::after {
    content: "";
    position: absolute;
    inset-inline: 0;
    top: 50%;
    height: 70%;
    background: var(--gap-highlight);
    border-radius: 2px;
    transform: translateY(-50%);
  }

  /* ── Measurements table ───────────────────────────────────── */
  #metrics {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 0.5rem 2.5rem;
    font-size: 0.95rem;
    /* Lining tabular figures: uniform height and width so columns align. */
    font-variant-numeric: lining-nums tabular-nums;
  }
  /* Identical content-sized column grids (em units, sized to the longest
     label) so the two tables align with each other — side by side AND
     stacked — without being wider than their content. */
  #metrics table { border-collapse: collapse; }
  #metrics thead th:nth-child(1) { width: 12em; }
  #metrics thead th:nth-child(2) { width: 5.2em; }
  #metrics thead th:nth-child(3) { width: 5.2em; }
  /* Compact drawers keep the paired choices together and move the width
     control below them. Feature and comparison controls form predictable
     two-column rows rather than wrapping wherever their text happens to fit. */
  @media (max-width: 760px) {
    .text-controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .controls .measure-control { grid-column: 1 / -1; }
    .feature-controls,
    .compare-controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .compare-controls #reset {
      grid-column: 1 / -1;
      justify-self: end;
    }
  }

  /* Phone-width windows: scale the em grid down with the type and stack
     the section ledger, while retaining the grids within each section. */
  @media (max-width: 480px) {
    body { padding: 1.6rem 1rem 4.5rem; }
    .masthead h1 { font-size: 2.2rem; }
    .masthead .subtitle { font-size: 1rem; }
    .view-toggle button {
      font-size: 0.78rem;
      padding: 0.15rem 0.35rem;
    }
    #dock-bar { gap: 0.55rem; }
    #dock-toggle { font-size: 0.8rem; }
    #flicker-hint { font-size: 0.78rem; }
    .panes { padding: 0 0.875rem 0.5rem; }
    #metrics { font-size: 0.85rem; }
    .controls {
      grid-template-columns: 1fr;
      gap: 0.4rem;
      padding: 0.6rem 0;
    }
    .controls > b {
      justify-self: start;
      padding-top: 0;
    }
    .controls > b:not(:first-child) { margin-top: 0.35rem; }
    .controls label { white-space: normal; }
    .text-controls,
    .feature-controls,
    .compare-controls { gap: 0.45rem 0.7rem; }
    .controls .hang-control {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
    }
    .controls .hang-control select {
      min-width: 0;
      max-width: none;
    }
    #dock-body { padding: 0.45rem 0.75rem 0.8rem; }
  }
  #metrics th, #metrics td {
    padding: 0.18rem 0 0.18rem 0.9rem;
    text-align: right;
  }
  #metrics th:first-child, #metrics td:first-child { text-align: left; padding-left: 0; }
  #metrics th:last-child, #metrics td:last-child { padding-right: 0; }
  #metrics thead th {
    font-weight: 500;
    border-bottom: 1px solid var(--ink);
  }
  #metrics tbody tr:last-child td { border-bottom: 1px solid var(--ink); }
  #metrics td.better { font-weight: 700; }

  /* ── Bottom dock: controls & metrics, collapsed by default ─── */
  @media (pointer: coarse) {
    /* A finger-sized hit area for the width slider without shifting
       layout; touch-action keeps page-scroll from stealing the first
       drag gesture. */
    #measure, #lastline {
      touch-action: none;
      padding: 14px 0;
      margin: -14px 0;
    }
  }
  #dock {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 50;
    background: var(--paper);
    border-top: 1px solid var(--hairline);
  }
  #dock-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.8rem;
    min-height: 2.35rem;
  }
  /* UI chrome text is never selectable — long-presses near the dock or
     toggles must not pop selection callouts (metrics stay copyable). */
  #dock-toggle,
  .view-toggle,
  .controls {
    user-select: none;
    -webkit-user-select: none;
  }
  #dock-toggle {
    display: block;
    padding: 0.45rem 0;
    font: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
  }
  #dock-body {
    max-height: 55vh;
    overflow-y: auto;
    padding: 0.6rem 1rem 1rem;
    /* Scroll affordance (mobile especially: the metrics tables sit below
       the drawer's fold): shadows appear at whichever edge has more
       content beyond it — the cover gradients scroll with the content
       (background-attachment: local) and hide the fixed shadows when the
       respective end is reached. */
    background:
      linear-gradient(var(--paper) 30%, transparent) center top / 100% 24px,
      linear-gradient(transparent, var(--paper) 70%) center bottom / 100% 24px,
      radial-gradient(farthest-side at 50% 0, var(--scroll-shadow), transparent)
        center top / 100% 9px,
      radial-gradient(farthest-side at 50% 100%, var(--scroll-shadow), transparent)
        center bottom / 100% 9px;
    background-repeat: no-repeat;
    background-attachment: local, local, scroll, scroll;
  }
  #dock-body #metrics { margin-top: 1.2rem; }
</style>
</head>
<body>
<header class="masthead">
  <h1>justif</h1>
  <p class="subtitle">Publication-grade text justification for the web</p>
  <p class="gh-link"><a href="https://github.com/lyallcooper/justif">view on github</a></p>
</header>

<input type="hidden" id="view" value="side" />
<input type="hidden" id="theme" value="system" />

<div class="panes">
  <div class="pane">
    <h2 id="browser-label">Browser</h2>
    <div class="article native" id="native"></div>
  </div>
  <div class="pane">
    <h2>justif</h2>
    <div class="article" id="enhanced"></div>
  </div>
</div>

<p class="ornament" aria-hidden="true">❧</p>

<div id="dock">
<span id="flicker-hint" role="status" aria-hidden="true"><span class="pointer-action">Click</span><span class="touch-action">Tap</span> &amp; hold anywhere to reveal the browser rendering</span>
<div id="dock-bar">
  <div class="view-toggle" role="group" aria-label="Comparison view">
    <button id="view-side" type="button" aria-pressed="true">side-by-side</button>
    <button id="view-flicker" type="button" aria-pressed="false"
      aria-label="Flicker view. Hold the text to reveal the browser rendering"
      aria-describedby="flicker-hint">flicker</button>
  </div>
  <button id="dock-toggle" type="button" aria-expanded="false">controls &amp; metrics ▴</button>
</div>
<div id="dock-body" hidden>

<div class="controls">
  <b>text</b>
  <div class="control-items text-controls">
    <label class="select-control">
      <span class="control-name">sample</span>
      <select id="sample">
        <optgroup label="Prose">
          <option value="aliceExcerpt" selected>Alice in Wonderland</option>
          <option value="tale">Frog Prince</option>
          <option value="frankenstein">Frankenstein</option>
          <option value="alice">Alice in Wonderland (long)</option>
        </optgroup>
        <optgroup label="Technical">
          <option value="tech">Technical post</option>
          <option value="rfc2324">RFC 2324</option>
        </optgroup>
        <optgroup label="Typography">
          <option value="specimen">Type specimen</option>
        </optgroup>
        <optgroup label="Other scripts">
          <option value="rtl">Hebrew &amp; Arabic (RTL)</option>
          <option value="soseki">吾輩は猫である (Japanese)</option>
        </optgroup>
      </select>
    </label>
    <label class="select-control">
      <span class="control-name">typeface</span>
      <select id="font">
        <optgroup label="Serif">
          <option value="'Junicode'" selected>Junicode</option>
          <option value="'EB Garamond'">EB Garamond</option>
          <option value="'Alegreya'">Alegreya</option>
          <option value="'IM Fell English'">IM Fell English</option>
          <option value="'Vollkorn'">Vollkorn</option>
          <option value="'Amstelvar'">Amstelvar</option>
          <option value="'Latin Modern Roman'">Latin Modern (TeX)</option>
          <option value="Georgia">Georgia</option>
          <!-- ui-serif/ui-monospace are WebKit-only; the stacks behind them
               pick the nearest system face per platform (Chrome/Firefox
               would otherwise skip the keyword and land on the article's
               Georgia fallback — a serif, even for "System mono"). -->
          <option value="ui-serif, Charter, 'Bitstream Charter', 'Sitka Text', Cambria, serif">System serif</option>
        </optgroup>
        <optgroup label="Sans">
          <option value="'Roboto Flex'">Roboto Flex</option>
          <option value="system-ui, sans-serif">System sans</option>
        </optgroup>
        <optgroup label="Monospace">
          <option value="'Courier Prime'">Courier Prime</option>
          <option value="'IBM Plex Mono'">IBM Plex Mono</option>
          <option value="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace">System mono</option>
        </optgroup>
      </select>
    </label>
    <label class="measure-control">
      <span class="control-name">width</span>
      <span class="measure-row">
        <input id="measure" type="range" min="10" max="36" step="0.5" value="26" />
        <span id="measure-out"></span>
        <button id="width-info" class="info" type="button" popovertarget="width-note"
          aria-label="Why is the width limited?" hidden>i</button>
      </span>
    </label>
    <div id="width-note" popover></div>
  </div>
  <b>features</b>
  <div class="control-items feature-controls">
    <label><input id="hyphenate" type="checkbox" checked /> hyphenation</label>
    <label><input id="protrusion" type="checkbox" checked /> protrusion</label>
    <label><input id="expansion" type="checkbox" checked /> expansion
      <button id="expansion-info" class="info" type="button" popovertarget="expansion-note"
        aria-label="Why is expansion disabled?" hidden>i</button></label>
    <div id="expansion-note" popover></div>
    <label><input id="tracking" type="checkbox" checked /> tracking</label>
    <label><input id="lastlinefit" type="checkbox" /> match last-line spacing</label>
    <label class="measure-control">
      <span class="control-name">min. last-line width</span>
      <span class="measure-row">
        <input id="lastline" type="range" min="0" max="1" step="0.01" value="0.33" />
        <span id="lastline-out"></span>
      </span>
    </label>
    <label class="hang-control">hang punctuation
      <button id="hangpunct-info" class="info" type="button" popovertarget="hangpunct-note"
        aria-label="Why is hanging punctuation disabled?" hidden>i</button>
      <select id="hangpunct">
        <option value="off">off</option>
        <option value="first-line" selected>line ends + first line start</option>
        <option value="all-lines">all</option>
      </select></label>
    <div id="hangpunct-note" popover></div>
  </div>
  <b>compare</b>
  <div class="control-items compare-controls">
    <label><input id="pretty" type="checkbox" /> text-wrap: pretty</label>
    <label><input id="blur" type="checkbox" /> <span>blur (squint test)</span></label>
    <label><input id="rulers" type="checkbox" /> margin rulers</label>
    <label><input id="deviation" type="checkbox" />
      <span>uneven spaces</span></label>
    <button id="reset" type="button">reset</button>
  </div>
  <b>display</b>
  <div class="control-items display-controls">
    <span class="theme-control">
      <span>appearance</span>
      <span class="theme-toggle" role="group" aria-label="Appearance">
        <button id="theme-system" type="button" aria-pressed="true">system</button>
        <button id="theme-light" type="button" aria-pressed="false">light</button>
        <button id="theme-dark" type="button" aria-pressed="false">dark</button>
      </span>
    </span>
  </div>
</div>

<div id="metrics" hidden>
  <table>
    <thead>
      <tr><th>lines</th><th>browser</th><th>justif</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <table>
    <thead>
      <tr><th>spacing</th><th>browser</th><th>justif</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>
</div>

<script type="module">
  import { hangingPunctuation, justify, latinProtrusion } from "../dist/index.js";
  import { hyphenateEnUS } from "../dist/hyphenate/en-us.js";

  // Sample texts. "tale": smart quotes, quote-opening paragraphs (left
  // protrusion). "tech": inline <code> in another font inside justified
  // lines, plus a <pre> block that justif leaves untouched. "specimen":
  // small caps, soft hyphens, no-break spaces, dashes, mixed inline markup.
  // "aliceExcerpt": a punctuation-rich passage that makes the spacing
  // comparison especially visible at the default measure. "alice":
  // Carroll's chapters I–VI complete (~13,400 words, ~300 paragraphs;
  // Project Gutenberg #11, public domain) — a long-document performance
  // stress test. Verse (the crocodile poem, Father William) keeps its <br>
  // line structure, which justif deliberately bails on: those paragraphs
  // render natively in both columns.
  const SAMPLES = {
    tale: `
      <p>In olden times when wishing still helped one, there lived a king
      whose daughters were all beautiful; and the youngest was so beautiful
      that the sun itself, which has seen so much, was astonished whenever it
      shone in her face. Close by the king’s castle lay a great dark forest,
      and under an old lime-tree in the forest was a well, and when the day
      was very warm, the king’s child went out into the forest and sat down
      by the side of the cool fountain; and when she was bored she took a
      golden ball, and threw it up on high and caught it; and this ball was
      her favorite plaything.</p>
      <p>Now it so happened that on one occasion the <em>princess’s golden
      ball</em> did not fall into the little hand which she was holding up
      for it, but on to the ground beyond, and rolled straight into the
      water. The king’s daughter followed it with her eyes, but it vanished,
      and the well was deep, so deep that the bottom could not be seen. At
      this she began to cry, and cried louder and louder, and could not be
      comforted.</p>
      <p>“What ails you, king’s daughter? You weep so that even a stone
      would show pity.” She looked round to the side from whence the voice
      came, and saw a frog stretching forth its big, ugly head from the
      water. “Ah, old water-splasher, is it you,” she said; “I am weeping
      for my golden ball, which has fallen into the well.”</p>
      <p>“Be quiet, and do not weep,” answered the frog. “I can help you,
      but what will you give me if I bring your plaything up again?”
      “Whatever you will have, dear frog,” said she—“my clothes, my pearls
      and jewels, and even the golden crown which I am wearing.”</p>`,

    tech: `
      <p>A browser normally breaks justified text one line at a time. It
      fills the available measure, commits to a break, and stretches the
      spaces that remain. This is fast and predictable, but a stubborn token
      such as <code>getBoundingClientRect()</code> can be sent intact to the
      next line, leaving the preceding gaps to absorb the difference. In a
      narrow column, those gaps become the first thing the eye sees.</p>
      <pre><code>import { justify } from "justif";
import { hyphenateEnUS } from "justif/hyphenate/en-us";

const controller = justify(document.querySelectorAll("article p"), {
  hyphenate: hyphenateEnUS,
});

await controller.ready;</code></pre>
      <p><code>justify()</code> treats the paragraph as one problem. The
      Knuth–Plass algorithm compares feasible sets of breaks and chooses the
      sequence with the most even fit. The call above supplies
      <code>{ hyphenate: hyphenateEnUS }</code>, adding useful candidates;
      hanging punctuation cleans the edge; restrained spacing, tracking,
      and font-width adjustments refine each line without asking any one
      space to do all the work.</p>
      <p>The enhancement stays inside the elements you select. Links,
      <em>emphasis</em>, and inline <code>code</code> remain ordinary
      content: selectable, searchable, and copyable. The
      <code>&lt;pre&gt;</code> block above is not a paragraph, so it keeps its
      native layout. Resize the column and the controller lays out its
      paragraphs again; after fonts change, <code>controller.refresh()</code>
      repeats measurement, and <code>controller.destroy()</code> restores
      the original content.</p>`,

    specimen: `
      <p>“<span class="smcp">The reader should enter</span> a page as easily
      as a room.” Good typography does not ask to be admired before the
      words are understood. It gives each voice its register: roman for the
      steady argument, <em>italic for a change of tone</em>, and
      <strong>weight only where the structure needs it</strong>. Small
      capitals introduce a chapter without shouting, while fi, fl, and ffi
      settle difficult joins—fidelity, flowers, and affinity—into the
      rhythm of the line.</p>
      <p>Proportion makes the details cohere. A page numbered 1,024 can
      still feel light; a note marked Fig.&nbsp;7 stays with its figure; the
      years 1450–1455 take an en dash, while a sudden interruption—if it
      earns one—takes the longer em dash. Acronyms such as
      <span class="smcp">nasa</span> and
      <span class="smcp">unesco</span> sit more comfortably in small
      capitals. None should disturb the even texture of the page.</p>
      <p>At the margin, shape matters as much as width. “Look closely,” says
      the proofreader: ‘the opening quote may hang; the final comma may
      follow.’ Parentheses (even these), brackets [like these], and
      guillemets «like these» ask for optical rather than mathematical
      alignment. Round capitals—O, C, G, Q—and sloped ones—A, V, W, T—meet
      the edge differently, yet the column should appear calm.</p>
      <p>Narrow measures reveal every compromise. An
      un&shy;com&shy;pro&shy;mis&shy;ing word may need a discretionary break;
      “incomprehensibilities” may need several. A well-set paragraph
      balances those breaks with the spaces around them, preserves a
      <a href="#specimen">useful link</a>, and keeps No.&nbsp;12 intact. The
      test is simple: nothing snags the eye, and nothing important comes
      apart.</p>`,

    rtl: `
      <p dir="rtl" lang="he">בראשית ברא אלהים את השמים ואת הארץ. והארץ
      היתה תהו ובהו וחשך על פני תהום, ורוח אלהים מרחפת על פני המים. ויאמר
      אלהים: יהי אור, ויהי אור. וירא אלהים את האור כי טוב, ויבדל אלהים בין
      האור ובין החשך. ויקרא אלהים לאור יום ולחשך קרא לילה, ויהי ערב ויהי
      בקר, יום אחד.</p>
      <p dir="rtl" lang="he">ויאמר אלהים: יהי רקיע בתוך המים, ויהי מבדיל
      בין מים למים. ויעש אלהים את הרקיע, ויבדל בין המים אשר מתחת לרקיע
      ובין המים אשר מעל לרקיע, ויהי כן. ויקרא אלהים לרקיע שמים, ויהי ערב
      ויהי בקר, יום שני.</p>
      <p dir="rtl" lang="ar">اعلم أن فن التاريخ فن عزيز المذهب، جم
      الفوائد، شريف الغاية؛ إذ هو يوقفنا على أحوال الماضين من الأمم في
      أخلاقهم، والأنبياء في سيرهم، والملوك في دولهم وسياستهم؛ حتى تتم
      فائدة الاقتداء في ذلك لمن يرومه في أحوال الدين والدنيا.</p>
      <p dir="rtl" lang="ar">فهو محتاج إلى مآخذ متعددة ومعارف متنوعة،
      وحسن نظر وتثبت، يفضيان بصاحبهما إلى الحق وينكبان به عن المزلات
      والمغالط؛ لأن الأخبار إذا اعتمد فيها على مجرد النقل، ولم تحكم أصول
      العادة وقواعد السياسة وطبيعة العمران والأحوال في الاجتماع الإنساني،
      ولا قيس الغائب منها بالشاهد والحاضر بالذاهب، فربما لم يؤمن فيها من
      العثور ومزلة القدم والحيد عن جادة الصدق.</p>`,
    // Natsume Sōseki, "I Am a Cat" (1905), public domain. Japanese prose
    // has no inter-word spaces: justif breaks between characters (kinsoku
    // permitting) and justifies by distributing space BETWEEN them, so the
    // browser column's greedy wrap and justif differ in break choice, not
    // gap width. Each <p> is a single source line — indentation newlines
    // inside would become spurious breakable spaces mid-sentence.
    soseki: `
      <p lang="ja">吾輩は猫である。名前はまだ無い。どこで生れたかとんと見当がつかぬ。何でも薄暗いじめじめした所でニャーニャー泣いていた事だけは記憶している。吾輩はここで始めて人間というものを見た。しかもあとで聞くとそれは書生という人間中で一番獰悪な種族であったそうだ。この書生というのは時々我々を捕えて煮て食うという話である。しかしその当時は何という考もなかったから別段恐しいとも思わなかった。ただ彼の掌に載せられてスーと持ち上げられた時何だかフワフワした感じがあったばかりである。</p>
      <p lang="ja">掌の上で少し落ちついて書生の顔を見たのがいわゆる人間というものの見始であろう。この時妙なものだと思った感じが今でも残っている。第一毛をもって装飾されべきはずの顔がつるつるしてまるで薬缶だ。その後猫にもだいぶ逢ったがこんな片輪には一度も出会わした事がない。のみならず顔の真中があまりに突起している。そうしてその穴の中から時々ぷうぷうと煙を吹く。どうも咽せぽくて実に弱った。これが人間の飲む<em>煙草</em>というものである事はようやくこの頃知った。</p>
      <p lang="ja">この書生の掌の裏でしばらくはよい心持に坐っておったが、しばらくすると非常な速力で運転し始めた。書生が動くのか自分だけが動くのか分らないが無暗に眼が廻る。胸が悪くなる。到底助からないと思っていると、どさりと音がして眼から火が出た。それまでは記憶しているがあとは何の事やらいくら考え出そうとしても分らない。</p>`,

    // Mary Shelley, Frankenstein, Chapter V (Project Gutenberg #84).
    frankenstein: `
      <p>It was on a dreary night of November that I beheld the accomplishment
      of my toils. With an anxiety that almost amounted to agony, I collected
      the instruments of life around me, that I might infuse a spark of being
      into the lifeless thing that lay at my feet.</p>
      <p>It was already one in the morning; the rain pattered dismally against
      the panes, and my candle was nearly burnt out, when, by the glimmer of the
      half-extinguished light, I saw the dull yellow eye of the creature open;
      it breathed hard, and a convulsive motion agitated its limbs.</p>
      <p>How can I describe my emotions at this catastrophe, or how delineate
      the wretch whom with such infinite pains and care I had endeavoured to
      form? His limbs were in proportion, and I had selected his features as
      beautiful.</p>
      <p>Beautiful! Great God! His yellow skin scarcely covered the work of
      muscles and arteries beneath; his hair was of a lustrous black, and
      flowing; his teeth of a pearly whiteness; but these luxuriances only
      formed a more horrid contrast with his watery eyes, that seemed almost of
      the same colour as the dun-white sockets in which they were set, his
      shrivelled complexion and straight black lips.</p>
      <p>The different accidents of life are not so changeable as the feelings
      of human nature. I had worked hard for nearly two years, for the sole
      purpose of infusing life into an inanimate body. For this I had deprived
      myself of rest and health. I had desired it with an ardour that far
      exceeded moderation; but now that I had finished, the beauty of the dream
      vanished, and breathless horror and disgust filled my heart.</p>
      <p>Unable to endure the aspect of the being I had created, I rushed out
      of the room and continued a long time traversing my bed-chamber, unable
      to compose my mind to sleep. At length lassitude succeeded to the tumult
      I had before endured, and I threw myself on the bed in my clothes,
      endeavouring to seek a few moments of forgetfulness. But it was in vain;
      I slept, indeed, but I was disturbed by the wildest dreams. I thought I
      saw Elizabeth, in the bloom of health, walking in the streets of
      Ingolstadt.</p>`,

    // L. Masinter, IETF RFC 2324, “Hyper Text Coffee Pot Control Protocol”
    // (1998). The excerpts are identified in the sample label; quotation
    // marks and inline code are presentational markup.
    rfc2324: `
      <p>“There is coffee all over the world. Increasingly, in a world in
      which computing is ubiquitous, the computists want to make coffee.
      Coffee brewing is an art, but the distributed intelligence of the
      web-connected world transcends art. Thus, there is a strong, dark, rich
      requirement for a protocol designed espressoly for the brewing of
      coffee. Coffee is brewed using coffee pots. Networked coffee pots
      require a control protocol if they are to be controlled.”</p>
      <p>Increasingly, home and consumer devices are being connected to the
      Internet. Early networking experiments demonstrated vending devices
      connected to the Internet for status monitoring
      [<span class="smcp">coke</span>]. One of the first remotely
      <em>operated</em> machine to be hooked up to the Internet, the Internet
      Toaster, (controlled via <span class="smcp">snmp</span>) was debuted in
      1990 [<span class="smcp">rfc</span>2235].</p>
      <p>The demand for ubiquitous appliance connectivity that is causing
      the consumption of the <span class="smcp">ipv4</span> address space.
      Consumers want remote control of devices such as coffee pots so that
      they may wake up to freshly brewed coffee, or cause coffee to be
      prepared at a precise time after the completion of dinner
      preparations.</p>
      <p>This document specifies a Hyper Text Coffee Pot Control Protocol
      (<span class="smcp">htcpcp</span>), which permits the full request and
      responses necessary to control all devices capable of making the
      popular caffeinated hot beverages.</p>
      <p><span class="smcp">http</span> 1.1
      ([<span class="smcp">rfc</span>2068]) permits the transfer of web
      objects from origin servers to clients. The web is world-wide.
      <span class="smcp">htcpcp</span> is based on
      <span class="smcp">http</span>. This is because
      <span class="smcp">http</span> is everywhere. It could not be so
      pervasive without being good. Therefore, <span class="smcp">http</span>
      is good. If you want good coffee, <span class="smcp">htcpcp</span>
      needs to be good. To make <span class="smcp">htcpcp</span> good, it is
      good to base <span class="smcp">htcpcp</span> on
      <span class="smcp">http</span>.</p>
      <p>The <span class="smcp">htcpcp</span> protocol is built on top of
      <span class="smcp">http</span>, with the addition of a few new methods,
      header fields and return codes. All <span class="smcp">htcpcp</span>
      servers should be referred to with the “<code>coffee:</code>”
      <span class="smcp">uri</span> scheme (Section 4).</p>
      <p>Any attempt to brew coffee with a teapot should result in the error
      code “<code>418 I’m a teapot</code>”. The resulting entity body
      <span class="smcp">may</span> be short and stout.</p>`,

    // Lewis Carroll, Alice’s Adventures in Wonderland, Chapter II. The
    // opening paragraph gives the clearest comparison at the 13em default.
    aliceExcerpt: `
      <p>“Perhaps it doesn’t understand English,” thought Alice; “I daresay
      it’s a French mouse, come over with William the Conqueror.” (For, with
      all her knowledge of history, Alice had no very clear notion how long
      ago anything had happened.) So she began again: “Où est ma chatte?”
      which was the first sentence in her French lesson-book. The Mouse gave
      a sudden leap out of the water, and seemed to quiver all over with
      fright. “Oh, I beg your pardon!” cried Alice hastily, afraid that she
      had hurt the poor animal’s feelings. “I quite forgot you didn’t like
      cats.”</p>
      <p>“Not like cats!” cried the Mouse, in a shrill, passionate voice.
      “Would <em>you</em> like cats if you were me?”</p>
      <p>“Well, perhaps not,” said Alice in a soothing tone: “don’t be angry
      about it. And yet I wish I could show you our cat Dinah: I think you’d
      take a fancy to cats if you could only see her. She is such a dear
      quiet thing,” Alice went on, half to herself, as she swam lazily about
      in the pool, “and she sits purring so nicely by the fire, licking her
      paws and washing her face—and she is such a nice soft thing to
      nurse—and she’s such a capital one for catching mice—oh, I beg your
      pardon!” cried Alice again, for this time the Mouse was bristling all
      over, and she felt certain it must be really offended. “We won’t talk
      about her any more if you’d rather not.”</p>`,

    alice: `
      <p><span class="smcp">Chapter I.</span> Down the Rabbit-Hole</p>
      <p>Alice was beginning to get very tired of sitting by her sister on
      the bank, and of having nothing to do: once or twice she had peeped
      into the book her sister was reading, but it had no pictures or
      conversations in it, “and what is the use of a book,” thought Alice
      “without pictures or conversations?”</p>
      <p>So she was considering in her own mind (as well as she could, for
      the hot day made her feel very sleepy and stupid), whether the
      pleasure of making a daisy-chain would be worth the trouble of getting
      up and picking the daisies, when suddenly a White Rabbit with pink
      eyes ran close by her.</p>
      <p>There was nothing so <em>very</em> remarkable in that; nor did
      Alice think it so <em>very</em> much out of the way to hear the Rabbit
      say to itself, “Oh dear! Oh dear! I shall be late!” (when she thought
      it over afterwards, it occurred to her that she ought to have wondered
      at this, but at the time it all seemed quite natural); but when the
      Rabbit actually <em>took a watch out of its waistcoat-pocket</em>, and
      looked at it, and then hurried on, Alice started to her feet, for it
      flashed across her mind that she had never before seen a rabbit with
      either a waistcoat-pocket, or a watch to take out of it, and burning
      with curiosity, she ran across the field after it, and fortunately was
      just in time to see it pop down a large rabbit-hole under the
      hedge.</p>
      <p>In another moment down went Alice after it, never once considering
      how in the world she was to get out again.</p>
      <p>The rabbit-hole went straight on like a tunnel for some way, and
      then dipped suddenly down, so suddenly that Alice had not a moment to
      think about stopping herself before she found herself falling down a
      very deep well.</p>
      <p>Either the well was very deep, or she fell very slowly, for she had
      plenty of time as she went down to look about her and to wonder what
      was going to happen next. First, she tried to look down and make out
      what she was coming to, but it was too dark to see anything; then she
      looked at the sides of the well, and noticed that they were filled
      with cupboards and book-shelves; here and there she saw maps and
      pictures hung upon pegs. She took down a jar from one of the shelves
      as she passed; it was labelled “ORANGE MARMALADE”, but to her great
      disappointment it was empty: she did not like to drop the jar for fear
      of killing somebody underneath, so managed to put it into one of the
      cupboards as she fell past it.</p>
      <p>“Well!” thought Alice to herself, “after such a fall as this, I
      shall think nothing of tumbling down stairs! How brave they’ll all
      think me at home! Why, I wouldn’t say anything about it, even if I
      fell off the top of the house!” (Which was very likely true.)</p>
      <p>Down, down, down. Would the fall <em>never</em> come to an end? “I
      wonder how many miles I’ve fallen by this time?” she said aloud. “I
      must be getting somewhere near the centre of the earth. Let me see:
      that would be four thousand miles down, I think—” (for, you see, Alice
      had learnt several things of this sort in her lessons in the
      schoolroom, and though this was not a <em>very</em> good opportunity
      for showing off her knowledge, as there was no one to listen to her,
      still it was good practice to say it over) “—yes, that’s about the
      right distance—but then I wonder what Latitude or Longitude I’ve got
      to?” (Alice had no idea what Latitude was, or Longitude either, but
      thought they were nice grand words to say.)</p>
      <p>Presently she began again. “I wonder if I shall fall right
      <em>through</em> the earth! How funny it’ll seem to come out among the
      people that walk with their heads downward! The Antipathies, I think—”
      (she was rather glad there <em>was</em> no one listening, this time,
      as it didn’t sound at all the right word) “—but I shall have to ask
      them what the name of the country is, you know. Please, Ma’am, is this
      New Zealand or Australia?” (and she tried to curtsey as she
      spoke—fancy <em>curtseying</em> as you’re falling through the air! Do
      you think you could manage it?) “And what an ignorant little girl
      she’ll think me for asking! No, it’ll never do to ask: perhaps I shall
      see it written up somewhere.”</p>
      <p>Down, down, down. There was nothing else to do, so Alice soon began
      talking again. “Dinah’ll miss me very much to-night, I should think!”
      (Dinah was the cat.) “I hope they’ll remember her saucer of milk at
      tea-time. Dinah my dear! I wish you were down here with me! There are
      no mice in the air, I’m afraid, but you might catch a bat, and that’s
      very like a mouse, you know. But do cats eat bats, I wonder?” And here
      Alice began to get rather sleepy, and went on saying to herself, in a
      dreamy sort of way, “Do cats eat bats? Do cats eat bats?” and
      sometimes, “Do bats eat cats?” for, you see, as she couldn’t answer
      either question, it didn’t much matter which way she put it. She felt
      that she was dozing off, and had just begun to dream that she was
      walking hand in hand with Dinah, and saying to her very earnestly,
      “Now, Dinah, tell me the truth: did you ever eat a bat?” when
      suddenly, thump! thump! down she came upon a heap of sticks and dry
      leaves, and the fall was over.</p>
      <p>Alice was not a bit hurt, and she jumped up on to her feet in a
      moment: she looked up, but it was all dark overhead; before her was
      another long passage, and the White Rabbit was still in sight,
      hurrying down it. There was not a moment to be lost: away went Alice
      like the wind, and was just in time to hear it say, as it turned a
      corner, “Oh my ears and whiskers, how late it’s getting!” She was
      close behind it when she turned the corner, but the Rabbit was no
      longer to be seen: she found herself in a long, low hall, which was
      lit up by a row of lamps hanging from the roof.</p>
      <p>There were doors all round the hall, but they were all locked; and
      when Alice had been all the way down one side and up the other, trying
      every door, she walked sadly down the middle, wondering how she was
      ever to get out again.</p>
      <p>Suddenly she came upon a little three-legged table, all made of
      solid glass; there was nothing on it except a tiny golden key, and
      Alice’s first thought was that it might belong to one of the doors of
      the hall; but, alas! either the locks were too large, or the key was
      too small, but at any rate it would not open any of them. However, on
      the second time round, she came upon a low curtain she had not noticed
      before, and behind it was a little door about fifteen inches high: she
      tried the little golden key in the lock, and to her great delight it
      fitted!</p>
      <p>Alice opened the door and found that it led into a small passage,
      not much larger than a rat-hole: she knelt down and looked along the
      passage into the loveliest garden you ever saw. How she longed to get
      out of that dark hall, and wander about among those beds of bright
      flowers and those cool fountains, but she could not even get her head
      through the doorway; “and even if my head would go through,” thought
      poor Alice, “it would be of very little use without my shoulders. Oh,
      how I wish I could shut up like a telescope! I think I could, if I
      only knew how to begin.” For, you see, so many out-of-the-way things
      had happened lately, that Alice had begun to think that very few
      things indeed were really impossible.</p>
      <p>There seemed to be no use in waiting by the little door, so she
      went back to the table, half hoping she might find another key on it,
      or at any rate a book of rules for shutting people up like telescopes:
      this time she found a little bottle on it, (“which certainly was not
      here before,” said Alice,) and round the neck of the bottle was a
      paper label, with the words “DRINK ME,” beautifully printed on it in
      large letters.</p>
      <p>It was all very well to say “Drink me,” but the wise little Alice
      was not going to do <em>that</em> in a hurry. “No, I’ll look first,”
      she said, “and see whether it’s marked ‘<em>poison</em>’ or not”; for
      she had read several nice little histories about children who had got
      burnt, and eaten up by wild beasts and other unpleasant things, all
      because they <em>would</em> not remember the simple rules their
      friends had taught them: such as, that a red-hot poker will burn you
      if you hold it too long; and that if you cut your finger <em>very</em>
      deeply with a knife, it usually bleeds; and she had never forgotten
      that, if you drink much from a bottle marked “poison,” it is almost
      certain to disagree with you, sooner or later.</p>
      <p>However, this bottle was <em>not</em> marked “poison,” so Alice
      ventured to taste it, and finding it very nice, (it had, in fact, a
      sort of mixed flavour of cherry-tart, custard, pine-apple, roast
      turkey, toffee, and hot buttered toast,) she very soon finished it
      off.</p>
      <p>“What a curious feeling!” said Alice; “I must be shutting up like a
      telescope.”</p>
      <p>And so it was indeed: she was now only ten inches high, and her
      face brightened up at the thought that she was now the right size for
      going through the little door into that lovely garden. First, however,
      she waited for a few minutes to see if she was going to shrink any
      further: she felt a little nervous about this; “for it might end, you
      know,” said Alice to herself, “in my going out altogether, like a
      candle. I wonder what I should be like then?” And she tried to fancy
      what the flame of a candle is like after the candle is blown out, for
      she could not remember ever having seen such a thing.</p>
      <p>After a while, finding that nothing more happened, she decided on
      going into the garden at once; but, alas for poor Alice! when she got
      to the door, she found she had forgotten the little golden key, and
      when she went back to the table for it, she found she could not
      possibly reach it: she could see it quite plainly through the glass,
      and she tried her best to climb up one of the legs of the table, but
      it was too slippery; and when she had tired herself out with trying,
      the poor little thing sat down and cried.</p>
      <p>“Come, there’s no use in crying like that!” said Alice to herself,
      rather sharply; “I advise you to leave off this minute!” She generally
      gave herself very good advice, (though she very seldom followed it),
      and sometimes she scolded herself so severely as to bring tears into
      her eyes; and once she remembered trying to box her own ears for
      having cheated herself in a game of croquet she was playing against
      herself, for this curious child was very fond of pretending to be two
      people. “But it’s no use now,” thought poor Alice, “to pretend to be
      two people! Why, there’s hardly enough of me left to make <em>one</em>
      respectable person!”</p>
      <p>Soon her eye fell on a little glass box that was lying under the
      table: she opened it, and found in it a very small cake, on which the
      words “EAT ME” were beautifully marked in currants. “Well, I’ll eat
      it,” said Alice, “and if it makes me grow larger, I can reach the key;
      and if it makes me grow smaller, I can creep under the door; so either
      way I’ll get into the garden, and I don’t care which happens!”</p>
      <p>She ate a little bit, and said anxiously to herself, “Which way?
      Which way?”, holding her hand on the top of her head to feel which way
      it was growing, and she was quite surprised to find that she remained
      the same size: to be sure, this generally happens when one eats cake,
      but Alice had got so much into the way of expecting nothing but
      out-of-the-way things to happen, that it seemed quite dull and stupid
      for life to go on in the common way.</p>
      <p>So she set to work, and very soon finished off the cake.</p>
      <p><span class="smcp">Chapter II.</span> The Pool of Tears</p>
      <p>“Curiouser and curiouser!” cried Alice (she was so much surprised,
      that for the moment she quite forgot how to speak good English); “now
      I’m opening out like the largest telescope that ever was! Good-bye,
      feet!” (for when she looked down at her feet, they seemed to be almost
      out of sight, they were getting so far off). “Oh, my poor little feet,
      I wonder who will put on your shoes and stockings for you now, dears?
      I’m sure <em>I</em> shan’t be able! I shall be a great deal too far
      off to trouble myself about you: you must manage the best way you
      can;—but I must be kind to them,” thought Alice, “or perhaps they
      won’t walk the way I want to go! Let me see: I’ll give them a new pair
      of boots every Christmas.”</p>
      <p>And she went on planning to herself how she would manage it. “They
      must go by the carrier,” she thought; “and how funny it’ll seem,
      sending presents to one’s own feet! And how odd the directions will
      look!</p>
      <p><em>Alice’s Right Foot, Esq., Hearthrug, near the Fender,</em>
      (<em>with Alice’s love</em>).</p>
      <p>Oh dear, what nonsense I’m talking!”</p>
      <p>Just then her head struck against the roof of the hall: in fact she
      was now more than nine feet high, and she at once took up the little
      golden key and hurried off to the garden door.</p>
      <p>Poor Alice! It was as much as she could do, lying down on one side,
      to look through into the garden with one eye; but to get through was
      more hopeless than ever: she sat down and began to cry again.</p>
      <p>“You ought to be ashamed of yourself,” said Alice, “a great girl
      like you,” (she might well say this), “to go on crying in this way!
      Stop this moment, I tell you!” But she went on all the same, shedding
      gallons of tears, until there was a large pool all round her, about
      four inches deep and reaching half down the hall.</p>
      <p>After a time she heard a little pattering of feet in the distance,
      and she hastily dried her eyes to see what was coming. It was the
      White Rabbit returning, splendidly dressed, with a pair of white kid
      gloves in one hand and a large fan in the other: he came trotting
      along in a great hurry, muttering to himself as he came, “Oh! the
      Duchess, the Duchess! Oh! won’t she be savage if I’ve kept her
      waiting!” Alice felt so desperate that she was ready to ask help of
      any one; so, when the Rabbit came near her, she began, in a low, timid
      voice, “If you please, sir—” The Rabbit started violently, dropped the
      white kid gloves and the fan, and skurried away into the darkness as
      hard as he could go.</p>
      <p>Alice took up the fan and gloves, and, as the hall was very hot,
      she kept fanning herself all the time she went on talking: “Dear,
      dear! How queer everything is to-day! And yesterday things went on
      just as usual. I wonder if I’ve been changed in the night? Let me
      think: was I the same when I got up this morning? I almost think I can
      remember feeling a little different. But if I’m not the same, the next
      question is, Who in the world am I? Ah, <em>that’s</em> the great
      puzzle!” And she began thinking over all the children she knew that
      were of the same age as herself, to see if she could have been changed
      for any of them.</p>
      <p>“I’m sure I’m not Ada,” she said, “for her hair goes in such long
      ringlets, and mine doesn’t go in ringlets at all; and I’m sure I can’t
      be Mabel, for I know all sorts of things, and she, oh! she knows such
      a very little! Besides, <em>she’s</em> she, and <em>I’m</em> I, and—oh
      dear, how puzzling it all is! I’ll try if I know all the things I used
      to know. Let me see: four times five is twelve, and four times six is
      thirteen, and four times seven is—oh dear! I shall never get to twenty
      at that rate! However, the Multiplication Table doesn’t signify: let’s
      try Geography. London is the capital of Paris, and Paris is the
      capital of Rome, and Rome—no, <em>that’s</em> all wrong, I’m certain!
      I must have been changed for Mabel! I’ll try and say ‘<em>How doth the
      little</em>—’” and she crossed her hands on her lap as if she were
      saying lessons, and began to repeat it, but her voice sounded hoarse
      and strange, and the words did not come the same as they used to
      do:—</p>
      <p>“How doth the little crocodile<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Improve his shining tail,<br />
      And pour the waters of the Nile<br />
      &nbsp;&nbsp;&nbsp;&nbsp;On every golden scale!</p>
      <p>“How cheerfully he seems to grin,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;How neatly spread his claws,<br />
      And welcome little fishes in<br />
      &nbsp;&nbsp;&nbsp;&nbsp;With gently smiling jaws!”</p>
      <p>“I’m sure those are not the right words,” said poor Alice, and her
      eyes filled with tears again as she went on, “I must be Mabel after
      all, and I shall have to go and live in that poky little house, and
      have next to no toys to play with, and oh! ever so many lessons to
      learn! No, I’ve made up my mind about it; if I’m Mabel, I’ll stay down
      here! It’ll be no use their putting their heads down and saying ‘Come
      up again, dear!’ I shall only look up and say ‘Who am I then? Tell me
      that first, and then, if I like being that person, I’ll come up: if
      not, I’ll stay down here till I’m somebody else’—but, oh dear!” cried
      Alice, with a sudden burst of tears, “I do wish they <em>would</em>
      put their heads down! I am so <em>very</em> tired of being all alone
      here!”</p>
      <p>As she said this she looked down at her hands, and was surprised to
      see that she had put on one of the Rabbit’s little white kid gloves
      while she was talking. “How <em>can</em> I have done that?” she
      thought. “I must be growing small again.” She got up and went to the
      table to measure herself by it, and found that, as nearly as she could
      guess, she was now about two feet high, and was going on shrinking
      rapidly: she soon found out that the cause of this was the fan she was
      holding, and she dropped it hastily, just in time to avoid shrinking
      away altogether.</p>
      <p>“That <em>was</em> a narrow escape!” said Alice, a good deal
      frightened at the sudden change, but very glad to find herself still
      in existence; “and now for the garden!” and she ran with all speed
      back to the little door: but, alas! the little door was shut again,
      and the little golden key was lying on the glass table as before, “and
      things are worse than ever,” thought the poor child, “for I never was
      so small as this before, never! And I declare it’s too bad, that it
      is!”</p>
      <p>As she said these words her foot slipped, and in another moment,
      splash! she was up to her chin in salt water. Her first idea was that
      she had somehow fallen into the sea, “and in that case I can go back
      by railway,” she said to herself. (Alice had been to the seaside once
      in her life, and had come to the general conclusion, that wherever you
      go to on the English coast you find a number of bathing machines in
      the sea, some children digging in the sand with wooden spades, then a
      row of lodging houses, and behind them a railway station.) However,
      she soon made out that she was in the pool of tears which she had wept
      when she was nine feet high.</p>
      <p>“I wish I hadn’t cried so much!” said Alice, as she swam about,
      trying to find her way out. “I shall be punished for it now, I
      suppose, by being drowned in my own tears! That <em>will</em> be a
      queer thing, to be sure! However, everything is queer to-day.”</p>
      <p>Just then she heard something splashing about in the pool a little
      way off, and she swam nearer to make out what it was: at first she
      thought it must be a walrus or hippopotamus, but then she remembered
      how small she was now, and she soon made out that it was only a mouse
      that had slipped in like herself.</p>
      <p>“Would it be of any use, now,” thought Alice, “to speak to this
      mouse? Everything is so out-of-the-way down here, that I should think
      very likely it can talk: at any rate, there’s no harm in trying.” So
      she began: “O Mouse, do you know the way out of this pool? I am very
      tired of swimming about here, O Mouse!” (Alice thought this must be
      the right way of speaking to a mouse: she had never done such a thing
      before, but she remembered having seen in her brother’s Latin Grammar,
      “A mouse—of a mouse—to a mouse—a mouse—O mouse!”) The Mouse looked at
      her rather inquisitively, and seemed to her to wink with one of its
      little eyes, but it said nothing.</p>
      <p>“Perhaps it doesn’t understand English,” thought Alice; “I daresay
      it’s a French mouse, come over with William the Conqueror.” (For, with
      all her knowledge of history, Alice had no very clear notion how long
      ago anything had happened.) So she began again: “Où est ma chatte?”
      which was the first sentence in her French lesson-book. The Mouse gave
      a sudden leap out of the water, and seemed to quiver all over with
      fright. “Oh, I beg your pardon!” cried Alice hastily, afraid that she
      had hurt the poor animal’s feelings. “I quite forgot you didn’t like
      cats.”</p>
      <p>“Not like cats!” cried the Mouse, in a shrill, passionate voice.
      “Would <em>you</em> like cats if you were me?”</p>
      <p>“Well, perhaps not,” said Alice in a soothing tone: “don’t be angry
      about it. And yet I wish I could show you our cat Dinah: I think you’d
      take a fancy to cats if you could only see her. She is such a dear
      quiet thing,” Alice went on, half to herself, as she swam lazily about
      in the pool, “and she sits purring so nicely by the fire, licking her
      paws and washing her face—and she is such a nice soft thing to
      nurse—and she’s such a capital one for catching mice—oh, I beg your
      pardon!” cried Alice again, for this time the Mouse was bristling all
      over, and she felt certain it must be really offended. “We won’t talk
      about her any more if you’d rather not.”</p>
      <p>“We indeed!” cried the Mouse, who was trembling down to the end of
      his tail. “As if <em>I</em> would talk on such a subject! Our family
      always <em>hated</em> cats: nasty, low, vulgar things! Don’t let me
      hear the name again!”</p>
      <p>“I won’t indeed!” said Alice, in a great hurry to change the
      subject of conversation. “Are you—are you fond—of—of dogs?” The Mouse
      did not answer, so Alice went on eagerly: “There is such a nice little
      dog near our house I should like to show you! A little bright-eyed
      terrier, you know, with oh, such long curly brown hair! And it’ll
      fetch things when you throw them, and it’ll sit up and beg for its
      dinner, and all sorts of things—I can’t remember half of them—and it
      belongs to a farmer, you know, and he says it’s so useful, it’s worth
      a hundred pounds! He says it kills all the rats and—oh dear!” cried
      Alice in a sorrowful tone, “I’m afraid I’ve offended it again!” For
      the Mouse was swimming away from her as hard as it could go, and
      making quite a commotion in the pool as it went.</p>
      <p>So she called softly after it, “Mouse dear! Do come back again, and
      we won’t talk about cats or dogs either, if you don’t like them!” When
      the Mouse heard this, it turned round and swam slowly back to her: its
      face was quite pale (with passion, Alice thought), and it said in a
      low trembling voice, “Let us get to the shore, and then I’ll tell you
      my history, and you’ll understand why it is I hate cats and dogs.”</p>
      <p>It was high time to go, for the pool was getting quite crowded with
      the birds and animals that had fallen into it: there were a Duck and a
      Dodo, a Lory and an Eaglet, and several other curious creatures. Alice
      led the way, and the whole party swam to the shore.</p>
      <p><span class="smcp">Chapter III.</span> A Caucus-Race and a Long Tale</p>
      <p>They were indeed a queer-looking party that assembled on the
      bank—the birds with draggled feathers, the animals with their fur
      clinging close to them, and all dripping wet, cross, and
      uncomfortable.</p>
      <p>The first question of course was, how to get dry again: they had a
      consultation about this, and after a few minutes it seemed quite
      natural to Alice to find herself talking familiarly with them, as if
      she had known them all her life. Indeed, she had quite a long argument
      with the Lory, who at last turned sulky, and would only say, “I am
      older than you, and must know better;” and this Alice would not allow
      without knowing how old it was, and, as the Lory positively refused to
      tell its age, there was no more to be said.</p>
      <p>At last the Mouse, who seemed to be a person of authority among
      them, called out, “Sit down, all of you, and listen to me!
      <em>I’ll</em> soon make you dry enough!” They all sat down at once, in
      a large ring, with the Mouse in the middle. Alice kept her eyes
      anxiously fixed on it, for she felt sure she would catch a bad cold if
      she did not get dry very soon.</p>
      <p>“Ahem!” said the Mouse with an important air, “are you all ready?
      This is the driest thing I know. Silence all round, if you please!
      ‘William the Conqueror, whose cause was favoured by the pope, was soon
      submitted to by the English, who wanted leaders, and had been of late
      much accustomed to usurpation and conquest. Edwin and Morcar, the
      earls of Mercia and Northumbria—’”</p>
      <p>“Ugh!” said the Lory, with a shiver.</p>
      <p>“I beg your pardon!” said the Mouse, frowning, but very politely:
      “Did you speak?”</p>
      <p>“Not I!” said the Lory hastily.</p>
      <p>“I thought you did,” said the Mouse. “—I proceed. ‘Edwin and
      Morcar, the earls of Mercia and Northumbria, declared for him: and
      even Stigand, the patriotic archbishop of Canterbury, found it
      advisable—’”</p>
      <p>“Found <em>what</em>?” said the Duck.</p>
      <p>“Found <em>it</em>,” the Mouse replied rather crossly: “of course
      you know what ‘it’ means.”</p>
      <p>“I know what ‘it’ means well enough, when <em>I</em> find a thing,”
      said the Duck: “it’s generally a frog or a worm. The question is, what
      did the archbishop find?”</p>
      <p>The Mouse did not notice this question, but hurriedly went on,
      “‘—found it advisable to go with Edgar Atheling to meet William and
      offer him the crown. William’s conduct at first was moderate. But the
      insolence of his Normans—’ How are you getting on now, my dear?” it
      continued, turning to Alice as it spoke.</p>
      <p>“As wet as ever,” said Alice in a melancholy tone: “it doesn’t seem
      to dry me at all.”</p>
      <p>“In that case,” said the Dodo solemnly, rising to its feet, “I move
      that the meeting adjourn, for the immediate adoption of more energetic
      remedies—”</p>
      <p>“Speak English!” said the Eaglet. “I don’t know the meaning of half
      those long words, and, what’s more, I don’t believe you do either!”
      And the Eaglet bent down its head to hide a smile: some of the other
      birds tittered audibly.</p>
      <p>“What I was going to say,” said the Dodo in an offended tone, “was,
      that the best thing to get us dry would be a Caucus-race.”</p>
      <p>“What <em>is</em> a Caucus-race?” said Alice; not that she wanted
      much to know, but the Dodo had paused as if it thought that
      <em>somebody</em> ought to speak, and no one else seemed inclined to
      say anything.</p>
      <p>“Why,” said the Dodo, “the best way to explain it is to do it.”
      (And, as you might like to try the thing yourself, some winter day, I
      will tell you how the Dodo managed it.)</p>
      <p>First it marked out a race-course, in a sort of circle, (“the exact
      shape doesn’t matter,” it said,) and then all the party were placed
      along the course, here and there. There was no “One, two, three, and
      away,” but they began running when they liked, and left off when they
      liked, so that it was not easy to know when the race was over.
      However, when they had been running half an hour or so, and were quite
      dry again, the Dodo suddenly called out “The race is over!” and they
      all crowded round it, panting, and asking, “But who has won?”</p>
      <p>This question the Dodo could not answer without a great deal of
      thought, and it sat for a long time with one finger pressed upon its
      forehead (the position in which you usually see Shakespeare, in the
      pictures of him), while the rest waited in silence. At last the Dodo
      said, “<em>Everybody</em> has won, and all must have prizes.”</p>
      <p>“But who is to give the prizes?” quite a chorus of voices
      asked.</p>
      <p>“Why, <em>she</em>, of course,” said the Dodo, pointing to Alice
      with one finger; and the whole party at once crowded round her,
      calling out in a confused way, “Prizes! Prizes!”</p>
      <p>Alice had no idea what to do, and in despair she put her hand in
      her pocket, and pulled out a box of comfits, (luckily the salt water
      had not got into it), and handed them round as prizes. There was
      exactly one a-piece, all round.</p>
      <p>“But she must have a prize herself, you know,” said the Mouse.</p>
      <p>“Of course,” the Dodo replied very gravely. “What else have you got
      in your pocket?” he went on, turning to Alice.</p>
      <p>“Only a thimble,” said Alice sadly.</p>
      <p>“Hand it over here,” said the Dodo.</p>
      <p>Then they all crowded round her once more, while the Dodo solemnly
      presented the thimble, saying “We beg your acceptance of this elegant
      thimble;” and, when it had finished this short speech, they all
      cheered.</p>
      <p>Alice thought the whole thing very absurd, but they all looked so
      grave that she did not dare to laugh; and, as she could not think of
      anything to say, she simply bowed, and took the thimble, looking as
      solemn as she could.</p>
      <p>The next thing was to eat the comfits: this caused some noise and
      confusion, as the large birds complained that they could not taste
      theirs, and the small ones choked and had to be patted on the back.
      However, it was over at last, and they sat down again in a ring, and
      begged the Mouse to tell them something more.</p>
      <p>“You promised to tell me your history, you know,” said Alice, “and
      why it is you hate—C and D,” she added in a whisper, half afraid that
      it would be offended again.</p>
      <p>“Mine is a long and a sad tale!” said the Mouse, turning to Alice,
      and sighing.</p>
      <p>“It <em>is</em> a long tail, certainly,” said Alice, looking down
      with wonder at the Mouse’s tail; “but why do you call it sad?” And she
      kept on puzzling about it while the Mouse was speaking, so that her
      idea of the tale was something like this:—</p>
      <p>“Fury said to a mouse, That he met in the house, ‘Let us both go to
      law: <em>I</em> will prosecute <em>you</em>.—Come, I’ll take no
      denial; We must have a trial: For really this morning I’ve nothing to
      do.’ Said the mouse to the cur, ‘Such a trial, dear sir, With no jury
      or judge, would be wasting our breath.’ ‘I’ll be judge, I’ll be jury,’
      Said cunning old Fury: ‘I’ll try the whole cause, and condemn you to
      death.’”</p>
      <p>“You are not attending!” said the Mouse to Alice severely. “What
      are you thinking of?”</p>
      <p>“I beg your pardon,” said Alice very humbly: “you had got to the
      fifth bend, I think?”</p>
      <p>“I had <em>not!</em>” cried the Mouse, sharply and very
      angrily.</p>
      <p>“A knot!” said Alice, always ready to make herself useful, and
      looking anxiously about her. “Oh, do let me help to undo it!”</p>
      <p>“I shall do nothing of the sort,” said the Mouse, getting up and
      walking away. “You insult me by talking such nonsense!”</p>
      <p>“I didn’t mean it!” pleaded poor Alice. “But you’re so easily
      offended, you know!”</p>
      <p>The Mouse only growled in reply.</p>
      <p>“Please come back and finish your story!” Alice called after it;
      and the others all joined in chorus, “Yes, please do!” but the Mouse
      only shook its head impatiently, and walked a little quicker.</p>
      <p>“What a pity it wouldn’t stay!” sighed the Lory, as soon as it was
      quite out of sight; and an old Crab took the opportunity of saying to
      her daughter “Ah, my dear! Let this be a lesson to you never to lose
      <em>your</em> temper!” “Hold your tongue, Ma!” said the young Crab, a
      little snappishly. “You’re enough to try the patience of an
      oyster!”</p>
      <p>“I wish I had our Dinah here, I know I do!” said Alice aloud,
      addressing nobody in particular. “She’d soon fetch it back!”</p>
      <p>“And who is Dinah, if I might venture to ask the question?” said
      the Lory.</p>
      <p>Alice replied eagerly, for she was always ready to talk about her
      pet: “Dinah’s our cat. And she’s such a capital one for catching mice
      you can’t think! And oh, I wish you could see her after the birds!
      Why, she’ll eat a little bird as soon as look at it!”</p>
      <p>This speech caused a remarkable sensation among the party. Some of
      the birds hurried off at once: one old Magpie began wrapping itself up
      very carefully, remarking, “I really must be getting home; the
      night-air doesn’t suit my throat!” and a Canary called out in a
      trembling voice to its children, “Come away, my dears! It’s high time
      you were all in bed!” On various pretexts they all moved off, and
      Alice was soon left alone.</p>
      <p>“I wish I hadn’t mentioned Dinah!” she said to herself in a
      melancholy tone. “Nobody seems to like her, down here, and I’m sure
      she’s the best cat in the world! Oh, my dear Dinah! I wonder if I
      shall ever see you any more!” And here poor Alice began to cry again,
      for she felt very lonely and low-spirited. In a little while, however,
      she again heard a little pattering of footsteps in the distance, and
      she looked up eagerly, half hoping that the Mouse had changed his
      mind, and was coming back to finish his story.</p>
      <p><span class="smcp">Chapter IV.</span> The Rabbit Sends in a Little Bill</p>
      <p>It was the White Rabbit, trotting slowly back again, and looking
      anxiously about as it went, as if it had lost something; and she heard
      it muttering to itself “The Duchess! The Duchess! Oh my dear paws! Oh
      my fur and whiskers! She’ll get me executed, as sure as ferrets are
      ferrets! Where <em>can</em> I have dropped them, I wonder?” Alice
      guessed in a moment that it was looking for the fan and the pair of
      white kid gloves, and she very good-naturedly began hunting about for
      them, but they were nowhere to be seen—everything seemed to have
      changed since her swim in the pool, and the great hall, with the glass
      table and the little door, had vanished completely.</p>
      <p>Very soon the Rabbit noticed Alice, as she went hunting about, and
      called out to her in an angry tone, “Why, Mary Ann, what <em>are</em>
      you doing out here? Run home this moment, and fetch me a pair of
      gloves and a fan! Quick, now!” And Alice was so much frightened that
      she ran off at once in the direction it pointed to, without trying to
      explain the mistake it had made.</p>
      <p>“He took me for his housemaid,” she said to herself as she ran.
      “How surprised he’ll be when he finds out who I am! But I’d better
      take him his fan and gloves—that is, if I can find them.” As she said
      this, she came upon a neat little house, on the door of which was a
      bright brass plate with the name “W. RABBIT,” engraved upon it. She
      went in without knocking, and hurried upstairs, in great fear lest she
      should meet the real Mary Ann, and be turned out of the house before
      she had found the fan and gloves.</p>
      <p>“How queer it seems,” Alice said to herself, “to be going messages
      for a rabbit! I suppose Dinah’ll be sending me on messages next!” And
      she began fancying the sort of thing that would happen: “‘Miss Alice!
      Come here directly, and get ready for your walk!’ ‘Coming in a minute,
      nurse! But I’ve got to see that the mouse doesn’t get out.’ Only I
      don’t think,” Alice went on, “that they’d let Dinah stop in the house
      if it began ordering people about like that!”</p>
      <p>By this time she had found her way into a tidy little room with a
      table in the window, and on it (as she had hoped) a fan and two or
      three pairs of tiny white kid gloves: she took up the fan and a pair
      of the gloves, and was just going to leave the room, when her eye fell
      upon a little bottle that stood near the looking-glass. There was no
      label this time with the words “DRINK ME,” but nevertheless she
      uncorked it and put it to her lips. “I know <em>something</em>
      interesting is sure to happen,” she said to herself, “whenever I eat
      or drink anything; so I’ll just see what this bottle does. I do hope
      it’ll make me grow large again, for really I’m quite tired of being
      such a tiny little thing!”</p>
      <p>It did so indeed, and much sooner than she had expected: before she
      had drunk half the bottle, she found her head pressing against the
      ceiling, and had to stoop to save her neck from being broken. She
      hastily put down the bottle, saying to herself “That’s quite enough—I
      hope I shan’t grow any more—As it is, I can’t get out at the door—I do
      wish I hadn’t drunk quite so much!”</p>
      <p>Alas! it was too late to wish that! She went on growing, and
      growing, and very soon had to kneel down on the floor: in another
      minute there was not even room for this, and she tried the effect of
      lying down with one elbow against the door, and the other arm curled
      round her head. Still she went on growing, and, as a last resource,
      she put one arm out of the window, and one foot up the chimney, and
      said to herself “Now I can do no more, whatever happens. What
      <em>will</em> become of me?”</p>
      <p>Luckily for Alice, the little magic bottle had now had its full
      effect, and she grew no larger: still it was very uncomfortable, and,
      as there seemed to be no sort of chance of her ever getting out of the
      room again, no wonder she felt unhappy.</p>
      <p>“It was much pleasanter at home,” thought poor Alice, “when one
      wasn’t always growing larger and smaller, and being ordered about by
      mice and rabbits. I almost wish I hadn’t gone down that
      rabbit-hole—and yet—and yet—it’s rather curious, you know, this sort
      of life! I do wonder what <em>can</em> have happened to me! When I
      used to read fairy-tales, I fancied that kind of thing never happened,
      and now here I am in the middle of one! There ought to be a book
