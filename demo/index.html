      written about me, that there ought! And when I grow up, I’ll write
      one—but I’m grown up now,” she added in a sorrowful tone; “at least
      there’s no room to grow up any more <em>here</em>.”</p>
      <p>“But then,” thought Alice, “shall I <em>never</em> get any older
      than I am now? That’ll be a comfort, one way—never to be an old
      woman—but then—always to have lessons to learn! Oh, I shouldn’t like
      <em>that!</em>”</p>
      <p>“Oh, you foolish Alice!” she answered herself. “How can you learn
      lessons in here? Why, there’s hardly room for <em>you</em>, and no
      room at all for any lesson-books!”</p>
      <p>And so she went on, taking first one side and then the other, and
      making quite a conversation of it altogether; but after a few minutes
      she heard a voice outside, and stopped to listen.</p>
      <p>“Mary Ann! Mary Ann!” said the voice. “Fetch me my gloves this
      moment!” Then came a little pattering of feet on the stairs. Alice
      knew it was the Rabbit coming to look for her, and she trembled till
      she shook the house, quite forgetting that she was now about a
      thousand times as large as the Rabbit, and had no reason to be afraid
      of it.</p>
      <p>Presently the Rabbit came up to the door, and tried to open it;
      but, as the door opened inwards, and Alice’s elbow was pressed hard
      against it, that attempt proved a failure. Alice heard it say to
      itself “Then I’ll go round and get in at the window.”</p>
      <p>“<em>That</em> you won’t!” thought Alice, and, after waiting till
      she fancied she heard the Rabbit just under the window, she suddenly
      spread out her hand, and made a snatch in the air. She did not get
      hold of anything, but she heard a little shriek and a fall, and a
      crash of broken glass, from which she concluded that it was just
      possible it had fallen into a cucumber-frame, or something of the
      sort.</p>
      <p>Next came an angry voice—the Rabbit’s—“Pat! Pat! Where are you?”
      And then a voice she had never heard before, “Sure then I’m here!
      Digging for apples, yer honour!”</p>
      <p>“Digging for apples, indeed!” said the Rabbit angrily. “Here! Come
      and help me out of <em>this!</em>” (Sounds of more broken glass.)</p>
      <p>“Now tell me, Pat, what’s that in the window?”</p>
      <p>“Sure, it’s an arm, yer honour!” (He pronounced it “arrum.”)</p>
      <p>“An arm, you goose! Who ever saw one that size? Why, it fills the
      whole window!”</p>
      <p>“Sure, it does, yer honour: but it’s an arm for all that.”</p>
      <p>“Well, it’s got no business there, at any rate: go and take it
      away!”</p>
      <p>There was a long silence after this, and Alice could only hear
      whispers now and then; such as, “Sure, I don’t like it, yer honour, at
      all, at all!” “Do as I tell you, you coward!” and at last she spread
      out her hand again, and made another snatch in the air. This time
      there were <em>two</em> little shrieks, and more sounds of broken
      glass. “What a number of cucumber-frames there must be!” thought
      Alice. “I wonder what they’ll do next! As for pulling me out of the
      window, I only wish they <em>could!</em> I’m sure <em>I</em> don’t
      want to stay in here any longer!”</p>
      <p>She waited for some time without hearing anything more: at last
      came a rumbling of little cartwheels, and the sound of a good many
      voices all talking together: she made out the words: “Where’s the
      other ladder?—Why, I hadn’t to bring but one; Bill’s got the
      other—Bill! fetch it here, lad!—Here, put ’em up at this corner—No,
      tie ’em together first—they don’t reach half high enough yet—Oh!
      they’ll do well enough; don’t be particular—Here, Bill! catch hold of
      this rope—Will the roof bear?—Mind that loose slate—Oh, it’s coming
      down! Heads below!” (a loud crash)—“Now, who did that?—It was Bill, I
      fancy—Who’s to go down the chimney?—Nay, <em>I</em> shan’t!
      <em>You</em> do it!—<em>That</em> I won’t, then!—Bill’s to go
      down—Here, Bill! the master says you’re to go down the chimney!”</p>
      <p>“Oh! So Bill’s got to come down the chimney, has he?” said Alice to
      herself. “Shy, they seem to put everything upon Bill! I wouldn’t be in
      Bill’s place for a good deal: this fireplace is narrow, to be sure;
      but I <em>think</em> I can kick a little!”</p>
      <p>She drew her foot as far down the chimney as she could, and waited
      till she heard a little animal (she couldn’t guess of what sort it
      was) scratching and scrambling about in the chimney close above her:
      then, saying to herself “This is Bill,” she gave one sharp kick, and
      waited to see what would happen next.</p>
      <p>The first thing she heard was a general chorus of “There goes
      Bill!” then the Rabbit’s voice along—“Catch him, you by the hedge!”
      then silence, and then another confusion of voices—“Hold up his
      head—Brandy now—Don’t choke him—How was it, old fellow? What happened
      to you? Tell us all about it!”</p>
      <p>Last came a little feeble, squeaking voice, (“That’s Bill,” thought
      Alice,) “Well, I hardly know—No more, thank ye; I’m better now—but I’m
      a deal too flustered to tell you—all I know is, something comes at me
      like a Jack-in-the-box, and up I goes like a sky-rocket!”</p>
      <p>“So you did, old fellow!” said the others.</p>
      <p>“We must burn the house down!” said the Rabbit’s voice; and Alice
      called out as loud as she could, “If you do, I’ll set Dinah at
      you!”</p>
      <p>There was a dead silence instantly, and Alice thought to herself,
      “I wonder what they <em>will</em> do next! If they had any sense,
      they’d take the roof off.” After a minute or two, they began moving
      about again, and Alice heard the Rabbit say, “A barrowful will do, to
      begin with.”</p>
      <p>“A barrowful of <em>what?</em>” thought Alice; but she had not long
      to doubt, for the next moment a shower of little pebbles came rattling
      in at the window, and some of them hit her in the face. “I’ll put a
      stop to this,” she said to herself, and shouted out, “You’d better not
      do that again!” which produced another dead silence.</p>
      <p>Alice noticed with some surprise that the pebbles were all turning
      into little cakes as they lay on the floor, and a bright idea came
      into her head. “If I eat one of these cakes,” she thought, “it’s sure
      to make <em>some</em> change in my size; and as it can’t possibly make
      me larger, it must make me smaller, I suppose.”</p>
      <p>So she swallowed one of the cakes, and was delighted to find that
      she began shrinking directly. As soon as she was small enough to get
      through the door, she ran out of the house, and found quite a crowd of
      little animals and birds waiting outside. The poor little Lizard,
      Bill, was in the middle, being held up by two guinea-pigs, who were
      giving it something out of a bottle. They all made a rush at Alice the
      moment she appeared; but she ran off as hard as she could, and soon
      found herself safe in a thick wood.</p>
      <p>“The first thing I’ve got to do,” said Alice to herself, as she
      wandered about in the wood, “is to grow to my right size again; and
      the second thing is to find my way into that lovely garden. I think
      that will be the best plan.”</p>
      <p>It sounded an excellent plan, no doubt, and very neatly and simply
      arranged; the only difficulty was, that she had not the smallest idea
      how to set about it; and while she was peering about anxiously among
      the trees, a little sharp bark just over her head made her look up in
      a great hurry.</p>
      <p>An enormous puppy was looking down at her with large round eyes,
      and feebly stretching out one paw, trying to touch her. “Poor little
      thing!” said Alice, in a coaxing tone, and she tried hard to whistle
      to it; but she was terribly frightened all the time at the thought
      that it might be hungry, in which case it would be very likely to eat
      her up in spite of all her coaxing.</p>
      <p>Hardly knowing what she did, she picked up a little bit of stick,
      and held it out to the puppy; whereupon the puppy jumped into the air
      off all its feet at once, with a yelp of delight, and rushed at the
      stick, and made believe to worry it; then Alice dodged behind a great
      thistle, to keep herself from being run over; and the moment she
      appeared on the other side, the puppy made another rush at the stick,
      and tumbled head over heels in its hurry to get hold of it; then
      Alice, thinking it was very like having a game of play with a
      cart-horse, and expecting every moment to be trampled under its feet,
      ran round the thistle again; then the puppy began a series of short
      charges at the stick, running a very little way forwards each time and
      a long way back, and barking hoarsely all the while, till at last it
      sat down a good way off, panting, with its tongue hanging out of its
      mouth, and its great eyes half shut.</p>
      <p>This seemed to Alice a good opportunity for making her escape; so
      she set off at once, and ran till she was quite tired and out of
      breath, and till the puppy’s bark sounded quite faint in the
      distance.</p>
      <p>“And yet what a dear little puppy it was!” said Alice, as she leant
      against a buttercup to rest herself, and fanned herself with one of
      the leaves: “I should have liked teaching it tricks very much, if—if
      I’d only been the right size to do it! Oh dear! I’d nearly forgotten
      that I’ve got to grow up again! Let me see—how <em>is</em> it to be
      managed? I suppose I ought to eat or drink something or other; but the
      great question is, what?”</p>
      <p>The great question certainly was, what? Alice looked all round her
      at the flowers and the blades of grass, but she did not see anything
      that looked like the right thing to eat or drink under the
      circumstances. There was a large mushroom growing near her, about the
      same height as herself; and when she had looked under it, and on both
      sides of it, and behind it, it occurred to her that she might as well
      look and see what was on the top of it.</p>
      <p>She stretched herself up on tiptoe, and peeped over the edge of the
      mushroom, and her eyes immediately met those of a large blue
      caterpillar, that was sitting on the top with its arms folded, quietly
      smoking a long hookah, and taking not the smallest notice of her or of
      anything else.</p>
      <p><span class="smcp">Chapter V.</span> Advice from a Caterpillar</p>
      <p>The Caterpillar and Alice looked at each other for some time in
      silence: at last the Caterpillar took the hookah out of its mouth, and
      addressed her in a languid, sleepy voice.</p>
      <p>“Who are <em>you?</em>” said the Caterpillar.</p>
      <p>This was not an encouraging opening for a conversation. Alice
      replied, rather shyly, “I—I hardly know, sir, just at present—at least
      I know who I <em>was</em> when I got up this morning, but I think I
      must have been changed several times since then.”</p>
      <p>“What do you mean by that?” said the Caterpillar sternly. “Explain
      yourself!”</p>
      <p>“I can’t explain <em>myself</em>, I’m afraid, sir,” said Alice,
      “because I’m not myself, you see.”</p>
      <p>“I don’t see,” said the Caterpillar.</p>
      <p>“I’m afraid I can’t put it more clearly,” Alice replied very
      politely, “for I can’t understand it myself to begin with; and being
      so many different sizes in a day is very confusing.”</p>
      <p>“It isn’t,” said the Caterpillar.</p>
      <p>“Well, perhaps you haven’t found it so yet,” said Alice; “but when
      you have to turn into a chrysalis—you will some day, you know—and then
      after that into a butterfly, I should think you’ll feel it a little
      queer, won’t you?”</p>
      <p>“Not a bit,” said the Caterpillar.</p>
      <p>“Well, perhaps your feelings may be different,” said Alice; “all I
      know is, it would feel very queer to <em>me</em>.”</p>
      <p>“You!” said the Caterpillar contemptuously. “Who are
      <em>you?</em>”</p>
      <p>Which brought them back again to the beginning of the conversation.
      Alice felt a little irritated at the Caterpillar’s making such
      <em>very</em> short remarks, and she drew herself up and said, very
      gravely, “I think, you ought to tell me who <em>you</em> are,
      first.”</p>
      <p>“Why?” said the Caterpillar.</p>
      <p>Here was another puzzling question; and as Alice could not think of
      any good reason, and as the Caterpillar seemed to be in a
      <em>very</em> unpleasant state of mind, she turned away.</p>
      <p>“Come back!” the Caterpillar called after her. “I’ve something
      important to say!”</p>
      <p>This sounded promising, certainly: Alice turned and came back
      again.</p>
      <p>“Keep your temper,” said the Caterpillar.</p>
      <p>“Is that all?” said Alice, swallowing down her anger as well as she
      could.</p>
      <p>“No,” said the Caterpillar.</p>
      <p>Alice thought she might as well wait, as she had nothing else to
      do, and perhaps after all it might tell her something worth hearing.
      For some minutes it puffed away without speaking, but at last it
      unfolded its arms, took the hookah out of its mouth again, and said,
      “So you think you’re changed, do you?”</p>
      <p>“I’m afraid I am, sir,” said Alice; “I can’t remember things as I
      used—and I don’t keep the same size for ten minutes together!”</p>
      <p>“Can’t remember <em>what</em> things?” said the Caterpillar.</p>
      <p>“Well, I’ve tried to say “How doth the little busy bee,” but it all
      came different!” Alice replied in a very melancholy voice.</p>
      <p>“Repeat, ‘<em>You are old, Father William</em>,’” said the
      Caterpillar.</p>
      <p>Alice folded her hands, and began:—</p>
      <p>“You are old, Father William,” the young man said,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;“And your hair has become very white;<br />
      And yet you incessantly stand on your head—<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Do you think, at your age, it is right?”</p>
      <p>“In my youth,” Father William replied to his son,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;“I feared it might injure the brain;<br />
      But, now that I’m perfectly sure I have none,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Why, I do it again and again.”</p>
      <p>“You are old,” said the youth, “as I mentioned before,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;And have grown most uncommonly fat;<br />
      Yet you turned a back-somersault in at the door—<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Pray, what is the reason of that?”</p>
      <p>“In my youth,” said the sage, as he shook his grey locks,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;“I kept all my limbs very supple<br />
      By the use of this ointment—one shilling the box—<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Allow me to sell you a couple?”</p>
      <p>“You are old,” said the youth, “and your jaws are too weak<br />
      &nbsp;&nbsp;&nbsp;&nbsp;For anything tougher than suet;<br />
      Yet you finished the goose, with the bones and the beak—<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Pray, how did you manage to do it?”</p>
      <p>“In my youth,” said his father, “I took to the law,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;And argued each case with my wife;<br />
      And the muscular strength, which it gave to my jaw,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Has lasted the rest of my life.”</p>
      <p>“You are old,” said the youth, “one would hardly suppose<br />
      &nbsp;&nbsp;&nbsp;&nbsp;That your eye was as steady as ever;<br />
      Yet you balanced an eel on the end of your nose—<br />
      &nbsp;&nbsp;&nbsp;&nbsp;What made you so awfully clever?”</p>
      <p>“I have answered three questions, and that is enough,”<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Said his father; “don’t give yourself airs!<br />
      Do you think I can listen all day to such stuff?<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Be off, or I’ll kick you down stairs!”</p>
      <p>“That is not said right,” said the Caterpillar.</p>
      <p>“Not <em>quite</em> right, I’m afraid,” said Alice, timidly; “some
      of the words have got altered.”</p>
      <p>“It is wrong from beginning to end,” said the Caterpillar
      decidedly, and there was silence for some minutes.</p>
      <p>The Caterpillar was the first to speak.</p>
      <p>“What size do you want to be?” it asked.</p>
      <p>“Oh, I’m not particular as to size,” Alice hastily replied; “only
      one doesn’t like changing so often, you know.”</p>
      <p>“I <em>don’t</em> know,” said the Caterpillar.</p>
      <p>Alice said nothing: she had never been so much contradicted in her
      life before, and she felt that she was losing her temper.</p>
      <p>“Are you content now?” said the Caterpillar.</p>
      <p>“Well, I should like to be a <em>little</em> larger, sir, if you
      wouldn’t mind,” said Alice: “three inches is such a wretched height to
      be.”</p>
      <p>“It is a very good height indeed!” said the Caterpillar angrily,
      rearing itself upright as it spoke (it was exactly three inches
      high).</p>
      <p>“But I’m not used to it!” pleaded poor Alice in a piteous tone. And
      she thought of herself, “I wish the creatures wouldn’t be so easily
      offended!”</p>
      <p>“You’ll get used to it in time,” said the Caterpillar; and it put
      the hookah into its mouth and began smoking again.</p>
      <p>This time Alice waited patiently until it chose to speak again. In
      a minute or two the Caterpillar took the hookah out of its mouth and
      yawned once or twice, and shook itself. Then it got down off the
      mushroom, and crawled away in the grass, merely remarking as it went,
      “One side will make you grow taller, and the other side will make you
      grow shorter.”</p>
      <p>“One side of <em>what?</em> The other side of <em>what?</em>”
      thought Alice to herself.</p>
      <p>“Of the mushroom,” said the Caterpillar, just as if she had asked
      it aloud; and in another moment it was out of sight.</p>
      <p>Alice remained looking thoughtfully at the mushroom for a minute,
      trying to make out which were the two sides of it; and as it was
      perfectly round, she found this a very difficult question. However, at
      last she stretched her arms round it as far as they would go, and
      broke off a bit of the edge with each hand.</p>
      <p>“And now which is which?” she said to herself, and nibbled a little
      of the right-hand bit to try the effect: the next moment she felt a
      violent blow underneath her chin: it had struck her foot!</p>
      <p>She was a good deal frightened by this very sudden change, but she
      felt that there was no time to be lost, as she was shrinking rapidly;
      so she set to work at once to eat some of the other bit. Her chin was
      pressed so closely against her foot, that there was hardly room to
      open her mouth; but she did it at last, and managed to swallow a
      morsel of the lefthand bit.</p>
      <p>“Come, my head’s free at last!” said Alice in a tone of delight,
      which changed into alarm in another moment, when she found that her
      shoulders were nowhere to be found: all she could see, when she looked
      down, was an immense length of neck, which seemed to rise like a stalk
      out of a sea of green leaves that lay far below her.</p>
      <p>“What <em>can</em> all that green stuff be?” said Alice. “And where
      <em>have</em> my shoulders got to? And oh, my poor hands, how is it I
      can’t see you?” She was moving them about as she spoke, but no result
      seemed to follow, except a little shaking among the distant green
      leaves.</p>
      <p>As there seemed to be no chance of getting her hands up to her
      head, she tried to get her head down to them, and was delighted to
      find that her neck would bend about easily in any direction, like a
      serpent. She had just succeeded in curving it down into a graceful
      zigzag, and was going to dive in among the leaves, which she found to
      be nothing but the tops of the trees under which she had been
      wandering, when a sharp hiss made her draw back in a hurry: a large
      pigeon had flown into her face, and was beating her violently with its
      wings.</p>
      <p>“Serpent!” screamed the Pigeon.</p>
      <p>“I’m <em>not</em> a serpent!” said Alice indignantly. “Let me
      alone!”</p>
      <p>“Serpent, I say again!” repeated the Pigeon, but in a more subdued
      tone, and added with a kind of sob, “I’ve tried every way, and nothing
      seems to suit them!”</p>
      <p>“I haven’t the least idea what you’re talking about,” said
      Alice.</p>
      <p>“I’ve tried the roots of trees, and I’ve tried banks, and I’ve
      tried hedges,” the Pigeon went on, without attending to her; “but
      those serpents! There’s no pleasing them!”</p>
      <p>Alice was more and more puzzled, but she thought there was no use
      in saying anything more till the Pigeon had finished.</p>
      <p>“As if it wasn’t trouble enough hatching the eggs,” said the
      Pigeon; “but I must be on the look-out for serpents night and day!
      Why, I haven’t had a wink of sleep these three weeks!”</p>
      <p>“I’m very sorry you’ve been annoyed,” said Alice, who was beginning
      to see its meaning.</p>
      <p>“And just as I’d taken the highest tree in the wood,” continued the
      Pigeon, raising its voice to a shriek, “and just as I was thinking I
      should be free of them at last, they must needs come wriggling down
      from the sky! Ugh, Serpent!”</p>
      <p>“But I’m <em>not</em> a serpent, I tell you!” said Alice. “I’m
      a—I’m a—”</p>
      <p>“Well! <em>What</em> are you?” said the Pigeon. “I can see you’re
      trying to invent something!”</p>
      <p>“I—I’m a little girl,” said Alice, rather doubtfully, as she
      remembered the number of changes she had gone through that day.</p>
      <p>“A likely story indeed!” said the Pigeon in a tone of the deepest
      contempt. “I’ve seen a good many little girls in my time, but never
      <em>one</em> with such a neck as that! No, no! You’re a serpent; and
      there’s no use denying it. I suppose you’ll be telling me next that
      you never tasted an egg!”</p>
      <p>“I <em>have</em> tasted eggs, certainly,” said Alice, who was a
      very truthful child; “but little girls eat eggs quite as much as
      serpents do, you know.”</p>
      <p>“I don’t believe it,” said the Pigeon; “but if they do, why then
      they’re a kind of serpent, that’s all I can say.”</p>
      <p>This was such a new idea to Alice, that she was quite silent for a
      minute or two, which gave the Pigeon the opportunity of adding,
      “You’re looking for eggs, I know <em>that</em> well enough; and what
      does it matter to me whether you’re a little girl or a serpent?”</p>
      <p>“It matters a good deal to <em>me</em>,” said Alice hastily; “but
      I’m not looking for eggs, as it happens; and if I was, I shouldn’t
      want <em>yours</em>: I don’t like them raw.”</p>
      <p>“Well, be off, then!” said the Pigeon in a sulky tone, as it
      settled down again into its nest. Alice crouched down among the trees
      as well as she could, for her neck kept getting entangled among the
      branches, and every now and then she had to stop and untwist it. After
      a while she remembered that she still held the pieces of mushroom in
      her hands, and she set to work very carefully, nibbling first at one
      and then at the other, and growing sometimes taller and sometimes
      shorter, until she had succeeded in bringing herself down to her usual
      height.</p>
      <p>It was so long since she had been anything near the right size,
      that it felt quite strange at first; but she got used to it in a few
      minutes, and began talking to herself, as usual. “Come, there’s half
      my plan done now! How puzzling all these changes are! I’m never sure
      what I’m going to be, from one minute to another! However, I’ve got
      back to my right size: the next thing is, to get into that beautiful
      garden—how <em>is</em> that to be done, I wonder?” As she said this,
      she came suddenly upon an open place, with a little house in it about
      four feet high. “Whoever lives there,” thought Alice, “it’ll never do
      to come upon them <em>this</em> size: why, I should frighten them out
      of their wits!” So she began nibbling at the righthand bit again, and
      did not venture to go near the house till she had brought herself down
      to nine inches high.</p>
      <p><span class="smcp">Chapter VI.</span> Pig and Pepper</p>
      <p>For a minute or two she stood looking at the house, and wondering
      what to do next, when suddenly a footman in livery came running out of
      the wood—(she considered him to be a footman because he was in livery:
      otherwise, judging by his face only, she would have called him a
      fish)—and rapped loudly at the door with his knuckles. It was opened
      by another footman in livery, with a round face, and large eyes like a
      frog; and both footmen, Alice noticed, had powdered hair that curled
      all over their heads. She felt very curious to know what it was all
      about, and crept a little way out of the wood to listen.</p>
      <p>The Fish-Footman began by producing from under his arm a great
      letter, nearly as large as himself, and this he handed over to the
      other, saying, in a solemn tone, “For the Duchess. An invitation from
      the Queen to play croquet.” The Frog-Footman repeated, in the same
      solemn tone, only changing the order of the words a little, “From the
      Queen. An invitation for the Duchess to play croquet.”</p>
      <p>Then they both bowed low, and their curls got entangled
      together.</p>
      <p>Alice laughed so much at this, that she had to run back into the
      wood for fear of their hearing her; and when she next peeped out the
      Fish-Footman was gone, and the other was sitting on the ground near
      the door, staring stupidly up into the sky.</p>
      <p>Alice went timidly up to the door, and knocked.</p>
      <p>“There’s no sort of use in knocking,” said the Footman, “and that
      for two reasons. First, because I’m on the same side of the door as
      you are; secondly, because they’re making such a noise inside, no one
      could possibly hear you.” And certainly there <em>was</em> a most
      extraordinary noise going on within—a constant howling and sneezing,
      and every now and then a great crash, as if a dish or kettle had been
      broken to pieces.</p>
      <p>“Please, then,” said Alice, “how am I to get in?”</p>
      <p>“There might be some sense in your knocking,” the Footman went on
      without attending to her, “if we had the door between us. For
      instance, if you were <em>inside</em>, you might knock, and I could
      let you out, you know.” He was looking up into the sky all the time he
      was speaking, and this Alice thought decidedly uncivil. “But perhaps
      he can’t help it,” she said to herself; “his eyes are so <em>very</em>
      nearly at the top of his head. But at any rate he might answer
      questions.—How am I to get in?” she repeated, aloud.</p>
      <p>“I shall sit here,” the Footman remarked, “till tomorrow—”</p>
      <p>At this moment the door of the house opened, and a large plate came
      skimming out, straight at the Footman’s head: it just grazed his nose,
      and broke to pieces against one of the trees behind him.</p>
      <p>“—or next day, maybe,” the Footman continued in the same tone,
      exactly as if nothing had happened.</p>
      <p>“How am I to get in?” asked Alice again, in a louder tone.</p>
      <p>“<em>Are</em> you to get in at all?” said the Footman. “That’s the
      first question, you know.”</p>
      <p>It was, no doubt: only Alice did not like to be told so. “It’s
      really dreadful,” she muttered to herself, “the way all the creatures
      argue. It’s enough to drive one crazy!”</p>
      <p>The Footman seemed to think this a good opportunity for repeating
      his remark, with variations. “I shall sit here,” he said, “on and off,
      for days and days.”</p>
      <p>“But what am <em>I</em> to do?” said Alice.</p>
      <p>“Anything you like,” said the Footman, and began whistling.</p>
      <p>“Oh, there’s no use in talking to him,” said Alice desperately:
      “he’s perfectly idiotic!” And she opened the door and went in.</p>
      <p>The door led right into a large kitchen, which was full of smoke
      from one end to the other: the Duchess was sitting on a three-legged
      stool in the middle, nursing a baby; the cook was leaning over the
      fire, stirring a large cauldron which seemed to be full of soup.</p>
      <p>“There’s certainly too much pepper in that soup!” Alice said to
      herself, as well as she could for sneezing.</p>
      <p>There was certainly too much of it in the air. Even the Duchess
      sneezed occasionally; and as for the baby, it was sneezing and howling
      alternately without a moment’s pause. The only things in the kitchen
      that did not sneeze, were the cook, and a large cat which was sitting
      on the hearth and grinning from ear to ear.</p>
      <p>“Please would you tell me,” said Alice, a little timidly, for she
      was not quite sure whether it was good manners for her to speak first,
      “why your cat grins like that?”</p>
      <p>“It’s a Cheshire cat,” said the Duchess, “and that’s why. Pig!”</p>
      <p>She said the last word with such sudden violence that Alice quite
      jumped; but she saw in another moment that it was addressed to the
      baby, and not to her, so she took courage, and went on again:—</p>
      <p>“I didn’t know that Cheshire cats always grinned; in fact, I didn’t
      know that cats <em>could</em> grin.”</p>
      <p>“They all can,” said the Duchess; “and most of ’em do.”</p>
      <p>“I don’t know of any that do,” Alice said very politely, feeling
      quite pleased to have got into a conversation.</p>
      <p>“You don’t know much,” said the Duchess; “and that’s a fact.”</p>
      <p>Alice did not at all like the tone of this remark, and thought it
      would be as well to introduce some other subject of conversation.
      While she was trying to fix on one, the cook took the cauldron of soup
      off the fire, and at once set to work throwing everything within her
      reach at the Duchess and the baby—the fire-irons came first; then
      followed a shower of saucepans, plates, and dishes. The Duchess took
      no notice of them even when they hit her; and the baby was howling so
      much already, that it was quite impossible to say whether the blows
      hurt it or not.</p>
      <p>“Oh, <em>please</em> mind what you’re doing!” cried Alice, jumping
      up and down in an agony of terror. “Oh, there goes his
      <em>precious</em> nose!” as an unusually large saucepan flew close by
      it, and very nearly carried it off.</p>
      <p>“If everybody minded their own business,” the Duchess said in a
      hoarse growl, “the world would go round a deal faster than it
      does.”</p>
      <p>“Which would <em>not</em> be an advantage,” said Alice, who felt
      very glad to get an opportunity of showing off a little of her
      knowledge. “Just think of what work it would make with the day and
      night! You see the earth takes twenty-four hours to turn round on its
      axis—”</p>
      <p>“Talking of axes,” said the Duchess, “chop off her head!”</p>
      <p>Alice glanced rather anxiously at the cook, to see if she meant to
      take the hint; but the cook was busily stirring the soup, and seemed
      not to be listening, so she went on again: “Twenty-four hours, I
      <em>think</em>; or is it twelve? I—”</p>
      <p>“Oh, don’t bother <em>me</em>,” said the Duchess; “I never could
      abide figures!” And with that she began nursing her child again,
      singing a sort of lullaby to it as she did so, and giving it a violent
      shake at the end of every line:</p>
      <p>“Speak roughly to your little boy,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;And beat him when he sneezes:<br />
      He only does it to annoy,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;Because he knows it teases.”</p>
      <p>CHORUS. (In which the cook and the baby joined):</p>
      <p>“Wow! wow! wow!”</p>
      <p>While the Duchess sang the second verse of the song, she kept
      tossing the baby violently up and down, and the poor little thing
      howled so, that Alice could hardly hear the words:—</p>
      <p>“I speak severely to my boy,<br />
      &nbsp;&nbsp;&nbsp;&nbsp;I beat him when he sneezes;<br />
      For he can thoroughly enjoy<br />
      &nbsp;&nbsp;&nbsp;&nbsp;The pepper when he pleases!”</p>
      <p>CHORUS.</p>
      <p>“Wow! wow! wow!”</p>
      <p>“Here! you may nurse it a bit, if you like!” the Duchess said to
      Alice, flinging the baby at her as she spoke. “I must go and get ready
      to play croquet with the Queen,” and she hurried out of the room. The
      cook threw a frying-pan after her as she went out, but it just missed
      her.</p>
      <p>Alice caught the baby with some difficulty, as it was a
      queer-shaped little creature, and held out its arms and legs in all
      directions, “just like a star-fish,” thought Alice. The poor little
      thing was snorting like a steam-engine when she caught it, and kept
      doubling itself up and straightening itself out again, so that
      altogether, for the first minute or two, it was as much as she could
      do to hold it.</p>
      <p>As soon as she had made out the proper way of nursing it, (which
      was to twist it up into a sort of knot, and then keep tight hold of
      its right ear and left foot, so as to prevent its undoing itself,) she
      carried it out into the open air. “If I don’t take this child away
      with me,” thought Alice, “they’re sure to kill it in a day or two:
      wouldn’t it be murder to leave it behind?” She said the last words out
      loud, and the little thing grunted in reply (it had left off sneezing
      by this time). “Don’t grunt,” said Alice; “that’s not at all a proper
      way of expressing yourself.”</p>
      <p>The baby grunted again, and Alice looked very anxiously into its
      face to see what was the matter with it. There could be no doubt that
      it had a <em>very</em> turn-up nose, much more like a snout than a
      real nose; also its eyes were getting extremely small for a baby:
      altogether Alice did not like the look of the thing at all. “But
      perhaps it was only sobbing,” she thought, and looked into its eyes
      again, to see if there were any tears.</p>
      <p>No, there were no tears. “If you’re going to turn into a pig, my
      dear,” said Alice, seriously, “I’ll have nothing more to do with you.
      Mind now!” The poor little thing sobbed again (or grunted, it was
      impossible to say which), and they went on for some while in
      silence.</p>
      <p>Alice was just beginning to think to herself, “Now, what am I to do
      with this creature when I get it home?” when it grunted again, so
      violently, that she looked down into its face in some alarm. This time
      there could be <em>no</em> mistake about it: it was neither more nor
      less than a pig, and she felt that it would be quite absurd for her to
      carry it further.</p>
      <p>So she set the little creature down, and felt quite relieved to see
      it trot away quietly into the wood. “If it had grown up,” she said to
      herself, “it would have made a dreadfully ugly child: but it makes
      rather a handsome pig, I think.” And she began thinking over other
      children she knew, who might do very well as pigs, and was just saying
      to herself, “if one only knew the right way to change them—” when she
      was a little startled by seeing the Cheshire Cat sitting on a bough of
      a tree a few yards off.</p>
      <p>The Cat only grinned when it saw Alice. It looked good-natured, she
      thought: still it had <em>very</em> long claws and a great many teeth,
      so she felt that it ought to be treated with respect.</p>
      <p>“Cheshire Puss,” she began, rather timidly, as she did not at all
      know whether it would like the name: however, it only grinned a little
      wider. “Come, it’s pleased so far,” thought Alice, and she went on.
      “Would you tell me, please, which way I ought to go from here?”</p>
      <p>“That depends a good deal on where you want to get to,” said the
      Cat.</p>
      <p>“I don’t much care where—” said Alice.</p>
      <p>“Then it doesn’t matter which way you go,” said the Cat.</p>
      <p>“—so long as I get <em>somewhere</em>,” Alice added as an
      explanation.</p>
      <p>“Oh, you’re sure to do that,” said the Cat, “if you only walk long
      enough.”</p>
      <p>Alice felt that this could not be denied, so she tried another
      question. “What sort of people live about here?”</p>
      <p>“In <em>that</em> direction,” the Cat said, waving its right paw
      round, “lives a Hatter: and in <em>that</em> direction,” waving the
      other paw, “lives a March Hare. Visit either you like: they’re both
      mad.”</p>
      <p>“But I don’t want to go among mad people,” Alice remarked.</p>
      <p>“Oh, you can’t help that,” said the Cat: “we’re all mad here. I’m
      mad. You’re mad.”</p>
      <p>“How do you know I’m mad?” said Alice.</p>
      <p>“You must be,” said the Cat, “or you wouldn’t have come here.”</p>
      <p>Alice didn’t think that proved it at all; however, she went on “And
      how do you know that you’re mad?”</p>
      <p>“To begin with,” said the Cat, “a dog’s not mad. You grant
      that?”</p>
      <p>“I suppose so,” said Alice.</p>
      <p>“Well, then,” the Cat went on, “you see, a dog growls when it’s
      angry, and wags its tail when it’s pleased. Now <em>I</em> growl when
      I’m pleased, and wag my tail when I’m angry. Therefore I’m mad.”</p>
      <p>“<em>I</em> call it purring, not growling,” said Alice.</p>
      <p>“Call it what you like,” said the Cat. “Do you play croquet with
      the Queen to-day?”</p>
      <p>“I should like it very much,” said Alice, “but I haven’t been
      invited yet.”</p>
      <p>“You’ll see me there,” said the Cat, and vanished.</p>
      <p>Alice was not much surprised at this, she was getting so used to
      queer things happening. While she was looking at the place where it
      had been, it suddenly appeared again.</p>
      <p>“By-the-bye, what became of the baby?” said the Cat. “I’d nearly
      forgotten to ask.”</p>
      <p>“It turned into a pig,” Alice quietly said, just as if it had come
      back in a natural way.</p>
      <p>“I thought it would,” said the Cat, and vanished again.</p>
      <p>Alice waited a little, half expecting to see it again, but it did
      not appear, and after a minute or two she walked on in the direction
      in which the March Hare was said to live. “I’ve seen hatters before,”
      she said to herself; “the March Hare will be much the most
      interesting, and perhaps as this is May it won’t be raving mad—at
      least not so mad as it was in March.” As she said this, she looked up,
      and there was the Cat again, sitting on a branch of a tree.</p>
      <p>“Did you say pig, or fig?” said the Cat.</p>
      <p>“I said pig,” replied Alice; “and I wish you wouldn’t keep
      appearing and vanishing so suddenly: you make one quite giddy.”</p>
      <p>“All right,” said the Cat; and this time it vanished quite slowly,
      beginning with the end of the tail, and ending with the grin, which
      remained some time after the rest of it had gone.</p>
      <p>“Well! I’ve often seen a cat without a grin,” thought Alice; “but a
      grin without a cat! It’s the most curious thing I ever saw in my
      life!”</p>
      <p>She had not gone much farther before she came in sight of the house
      of the March Hare: she thought it must be the right house, because the
      chimneys were shaped like ears and the roof was thatched with fur. It
      was so large a house, that she did not like to go nearer till she had
      nibbled some more of the lefthand bit of mushroom, and raised herself
      to about two feet high: even then she walked up towards it rather
      timidly, saying to herself “Suppose it should be raving mad after all!

    const hyphens = (a, article) =>
      article.querySelectorAll(".justif-hyphen").length || a.splitWords;

    const lineRows = [
      [LINE_LABELS[0], nat.lineCount, jus.lineCount, "lower"],
      [LINE_LABELS[1], hyphens(nat, native), hyphens(jus, enhanced), "lower"],
      [LINE_LABELS[2], nat.overfullLines, jus.overfullLines, "lower"],
      [LINE_LABELS[3], nat.shortLastLines, jus.shortLastLines, "lower"],
      [LINE_LABELS[4], nat.riverSpaces, jus.riverSpaces, "lower"],
    ];
    const spacingRows = [
      [SPACING_LABELS[0], pct(nat.stats.mean), pct(jus.stats.mean), 1,
        nat.stats.mean, jus.stats.mean],
      [SPACING_LABELS[1], pct(nat.stats.deviation), pct(jus.stats.deviation), "lower"],
      [SPACING_LABELS[2], pct(nat.stats.sd), pct(jus.stats.sd), "lower"],
      [SPACING_LABELS[3], relPct(nat.stats.max), relPct(jus.stats.max), "lower"],
    ];

    const makeRow = ([label, a, b, direction, compareA = a, compareB = b]) => {
      const tr = document.createElement("tr");
      const numeric = (v) => parseFloat(String(v).replace("−", "-").replace("+", ""));
      let aClass = "";
      let bClass = "";
      if (direction === "lower" && numeric(a) !== numeric(b)) {
        [aClass, bClass] = numeric(a) < numeric(b) ? ["better", "worse"] : ["worse", "better"];
      } else if (typeof direction === "number") {
        const aDistance = Math.abs(numeric(compareA) - direction);
        const bDistance = Math.abs(numeric(compareB) - direction);
        if (aDistance !== bDistance) {
          [aClass, bClass] = aDistance < bDistance ? ["better", "worse"] : ["worse", "better"];
        }
      }
      tr.innerHTML =
        `<td>${label}</td><td class="${aClass}">${a}</td><td class="${bClass}">${b}</td>`;
      return tr;
    };
    const [lineBody, spacingBody] = document.querySelectorAll("#metrics tbody");
    lineBody.replaceChildren(...lineRows.map(makeRow));
    spacingBody.replaceChildren(...spacingRows.map(makeRow));
    document.getElementById("metrics").hidden = false;
  }

  // ------------------------------------------------------------------
  // Update loop: settle-only — metrics/alignment wait 160ms past the last
  // relayout, so drags and justif's async re-layout never share a frame
  // with the full-column analysis.
  // ------------------------------------------------------------------

  let settleTimer = 0;

  /** True while flicker alignment margins are written on the justif
   * layer; lets alignStack skip 300 no-op clears outside flicker. */
  let stackAligned = false;
  /** Alignable blocks of a column: the deviation overlay appends .gapmark
   * divs as direct article children, which must not shift the pairing. */
  const blocksOf = (host) =>
    [...host.children].filter((el) => !el.classList.contains("gapmark"));
  /** Each block's own stylesheet margin-bottom (a <pre> differs from a
   * <p>), captured by alignStack while inline margins are cleared. */
  const naturalGap = new WeakMap();
  /**
   * Flicker mode: the BROWSER column is the layout authority. It carries no
   * margins and is never touched; each justif paragraph is pinned (via
   * margin-bottom on the justif layer only) to start exactly where the
   * browser's own rendering starts the corresponding paragraph. Measured on
   * the stress sample: justif never sets a paragraph taller than the
   * browser's (0/301, hyphenation-off and short-ending options included),
   * so the pin is exact; if a taller paragraph ever appears, it pushes the
   * next one down instead of overlapping, and later pairs re-sync as soon
   * as the browser column's slack absorbs the excess.
   */
  function alignStack() {
    const on = document.body.classList.contains("flicker-mode");
    if (!on && !stackAligned) return; // nothing to clear: skip the writes
    const eBlocks = blocksOf(enhanced);
    if (!on) {
      for (const b of eBlocks) b.style.marginBottom = "";
      stackAligned = false;
      return;
    }
    const nBlocks = blocksOf(native);
    if (nBlocks.length !== eBlocks.length || eBlocks.length === 0) return;
    stackAligned = true;
    // Clear, then one batched read of pristine geometry (fractional rects:
    // offsetTop/Height round to integers and the drift accumulates). The
    // cleared state also exposes each block's OWN stylesheet gap.
    for (const b of eBlocks) b.style.marginBottom = "";
    for (const b of eBlocks) {
      naturalGap.set(b, parseFloat(getComputedStyle(b).marginBottom) || 0);
    }
    const nTops = nBlocks.map((b) => b.getBoundingClientRect().top);
    const eR = eBlocks.map((b) => b.getBoundingClientRect());
    let eTop = eR[0].top;
    for (let i = 0; i + 1 < eBlocks.length; i++) {
      const eBottom = eTop + eR[i].height;
      const next = Math.max(nTops[i + 1], eBottom + (naturalGap.get(eBlocks[i]) ?? 16));
      eBlocks[i].style.marginBottom = next - eBottom + "px";
      eTop = next;
    }
  }

  function analysisVisible() {
    return !$("dock-body").hidden || $("deviation").checked;
  }

  /** Run a layout-mutating fn while keeping the topmost visible paragraph
   * where the user sees it. */
  function withScrollAnchor(fn) {
    // The anchor's TOP must be inside the viewport (a paragraph straddling
    // the top edge shifts everything below it when its own height changes,
    // uncompensated — the "text pops" bug).
    const anchor = [...document.querySelectorAll("#enhanced p")].find((el) => {
      const r = el.getBoundingClientRect();
      return r.top >= 0 && r.top < innerHeight;
    });
    const before = anchor ? anchor.getBoundingClientRect().top : 0;
    fn();
    if (anchor) {
      const delta = anchor.getBoundingClientRect().top - before;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    }
  }

  let visibleAlignQueued = false;
  function alignVisiblePairs() {
    visibleAlignQueued = false;
    if (!document.body.classList.contains("flicker-mode")) return;
    const nBlocks = blocksOf(native);
    const eBlocks = blocksOf(enhanced);
    if (nBlocks.length !== eBlocks.length) return;
    let i0 = -1;
    let i1 = -1;
    const eR = [];
    const nTop = [];
    for (let i = 0; i < eBlocks.length; i++) {
      const r = eBlocks[i].getBoundingClientRect();
      if (r.bottom < -200) continue;
      if (r.top > innerHeight + 200) break;
      if (i0 === -1) i0 = i;
      i1 = i;
      eR[i] = r;
      if (i + 1 < nBlocks.length) nTop[i + 1] = nBlocks[i + 1].getBoundingClientRect().top;
    }
    if (i0 === -1) return;
    let eTop = eR[i0].top;
    for (let i = i0; i <= i1 && i + 1 < eBlocks.length; i++) {
      const eBottom = eTop + eR[i].height;
      const next = Math.max(nTop[i + 1], eBottom + (naturalGap.get(eBlocks[i]) ?? 16));
      eBlocks[i].style.marginBottom = next - eBottom + "px";
      eTop = next;
    }
    stackAligned = true;
  }

  let measuringPass = 0;
  function updateNow() {
    withScrollAnchor(alignStack);
    if (!analysisVisible()) return;
    // Analysis is deferred a couple of frames and guarded by a pass
    // counter, so a heavy full-column word walk can never land mid-
    // interaction (any new scheduleUpdate supersedes an in-flight pass).
    const pass = ++measuringPass;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (pass !== measuringPass) return; // superseded by a newer settle
      // One analysis per column plus overlay origins (all reads) inside
      // the window; all DOM writes after it closes.
      const nat = analyze(native);
      const jus = analyze(enhanced);
      const origins = [native, enhanced].map((a) => a.getBoundingClientRect());
      renderMetrics(nat, jus);
      drawDeviations(native, nat, origins[0]);
      drawDeviations(enhanced, jus, origins[1]);
    }));
  }

  // Metrics and alignment run only once the page has settled: analysis is
  // a full-column word walk (hundreds of ms on long samples in WebKit)
  // and must never share a frame with a live drag.
  function scheduleUpdate() {
    // Supersede any in-flight deferred analysis pass.
    measuringPass++;
    clearTimeout(settleTimer);
    settleTimer = setTimeout(updateNow, 160);
  }

  // ------------------------------------------------------------------
  // Controls.
  // ------------------------------------------------------------------

  function syncMeasureLimit(preferredMeasure) {
    const slider = $("measure");
    // Mirror the .article CSS clamp: min(--measure, 100vw − 2.75rem).
    const availEm = Math.min(36, Math.floor((window.innerWidth - 2.75 * 16) / 16 / 0.5) * 0.5);
    slider.max = String(availEm);
    if (preferredMeasure !== undefined) slider.value = String(preferredMeasure);
    const limited = availEm < 36;
    $("width-info").hidden = !limited;
    if (limited) {
      $("width-note").textContent =
        "Your window can fit at most " + availEm + "em of column. The slider usually goes to 36em.";
    }
    if (parseFloat(slider.value) > availEm) {
      slider.value = String(availEm);
      applyMeasure();
    }
  }

  function applyMeasure() {
    // Width goes directly on the two articles, NOT via a body-level custom
    // property: changing an inherited custom property on <body> invalidates
    // the computed style of every element that can see it — with the long
    // sample that is tens of thousands of segment spans, and WebKit paid
    // ~100ms of style recalc per slider step before layout even began.
    const width = `min(${$("measure").value}em, calc(100vw - 2.75rem))`;
    for (const article of document.querySelectorAll(".article")) {
      article.style.width = width;
    }
    $("measure-out").textContent = $("measure").value + "em";
  }

  let applyGeneration = 0;
  // Serialized live-apply state for the last-line slider (see
  // lastlineLiveApply): the slider value the last completed apply()
  // rendered, so already-applied values are skipped.
  let lastlineApplied = null;
  let lastlineApplying = false;
  let lastlineDirty = false;

  async function apply() {
    const generation = ++applyGeneration;
    const family = $("font").value;
    await loadFontFamily(family);
    if (generation !== applyGeneration || family !== $("font").value) return;

    syncHangPunct();
    applyMeasure();
    document.body.style.setProperty("--demo-family", family);
    // Monospace main fonts: inline code has nothing to contrast with — inherit.
    const MONO_BODY = new Set(["'Courier Prime'", "'IBM Plex Mono'"]);
    syncExpansionAvailability();
    document.body.classList.toggle(
      "mono-body",
      MONO_BODY.has(family) || family.startsWith("ui-monospace"),
    );
    // Companion small-caps families: these designs ship true small caps as
    // a separate font rather than an smcp feature.
    const scFamily = SC_FAMILIES[family];
    document.body.classList.toggle("sc-family", scFamily !== undefined);
    if (scFamily !== undefined) document.body.style.setProperty("--sc-family", scFamily);

    controller?.destroy();
    controller = justify(enhanced.querySelectorAll("p"), {
      hyphenate: $("hyphenate").checked ? hyphenateEnUS : undefined,
      protrusion: $("protrusion").checked,
      hangingPunctuation: $("hangpunct").value === "off" ? false : $("hangpunct").value,
      expansion: $("expansion").checked ? undefined : false,
      tracking: $("tracking").checked,
      // Slider = the ending's minimum fraction of the measure (Bringhurst's
      // "at least a third" at 0.33 = the library default; 1 = rectangles
      // where affordable). ALWAYS passed explicitly: 0 must mean OFF, not
      // "fall back to the 0.33 default" — tex-compare's parity pin relies
      // on slider 0 being classic TeX.
      lastLineMinWidth: Number($("lastline").value),
      // eTeX \lastlinefit at full strength: the ending's word spaces adopt
      // the paragraph's mean stretch. Subtle at these measures (hyphenation
      // and expansion keep the body's mean near zero) — most visible with
      // hyphenation off at narrow measures.
      lastLineFit: $("lastlinefit").checked ? 1 : undefined,
      // Library-default spacing; ?pull= is a headless hook for tools
      // (tex-compare pins pull=0 for TeX space semantics — including
      // boundaryShrink 1: TeX shrinks glue wherever it sits, while the
      // library default holds spaces rigid at font-family boundaries).
      spacing:
        PULL_OVERRIDE === null
          ? undefined
          : { stretch: 0.5, shrink: 1 / 3, pull: Number(PULL_OVERRIDE), boundaryShrink: 1 },
      // justif re-lays out asynchronously (ResizeObserver → rAF); keep the
      // metrics and overlays in sync with every patch.
      onRelayout: (p) => {
        if (
          document.body.classList.contains("flicker-mode") &&
          !visibleAlignQueued
        ) {
          visibleAlignQueued = true;
          // Anchored: the alignment pins enhanced paragraphs to NATIVE
          // tops, and the (hidden) native layer reflows wholesale on every
          // width step — without compensation the visible justif text
          // faithfully follows that invisible bounce (~150px/frame).
          requestAnimationFrame(() => withScrollAnchor(alignVisiblePairs));
        }
        scheduleUpdate();
      },
    });
    // Every apply() renders whatever the slider holds right now (the
    // options above read it), whoever triggered the apply — record it so
    // the slider's live path can skip values that already rendered.
    lastlineApplied = $("lastline").value;
    await controller.ready;
    // Align the flicker stack in the same task the enhancement landed in —
    // before the next paint — so paragraphs start in place instead of
    // shifting down when the settle pass runs.
    alignStack();
    scheduleUpdate();
  }

  for (const id of ["font", "hyphenate", "protrusion", "hangpunct", "expansion", "tracking", "lastlinefit"]) {
    $(id).addEventListener("change", apply);
  }
  // Live readout for the last-line slider.
  function syncLastLineOut() {
    const v = Number($("lastline").value);
    $("lastline-out").textContent = v > 0 ? String(v) : "off";
  }
  // The text re-justifies LIVE while the slider drags. Applies are
  // serialized: one in flight at a time, drag events during it just mark
  // it dirty (the loop then re-applies the LATEST value — intermediate
  // positions coalesce away), and a value that already rendered is
  // skipped, so the trailing "change" costs nothing. "change" routes here
  // too because programmatic pins set value + change without any input
  // event (tools/tex-compare.mjs).
  async function lastlineLiveApply() {
    if (lastlineApplying) {
      lastlineDirty = true;
      return;
    }
    lastlineApplying = true;
    try {
      do {
        lastlineDirty = false;
        if ($("lastline").value !== lastlineApplied) await apply();
      } while (lastlineDirty);
    } finally {
      lastlineApplying = false;
    }
  }
  for (const event of ["input", "change"]) {
    $("lastline").addEventListener(event, () => {
      syncLastLineOut();
      lastlineLiveApply();
    });
  }
  // Full hangs are a protrusion style: without protrusion there is nothing
  // to hang, so the toggle grays out.
  function syncHangPunct() {
    const off = !$("protrusion").checked;
    $("hangpunct").disabled = off;
    $("hangpunct-info").hidden = !off;
    $("hangpunct-note").textContent =
      "Hanging punctuation is a protrusion style. Enable protrusion to use it.";
    // The browser column's CSS hanging-punctuation follows the same state:
    // a fair comparison hangs on both sides or neither.
    document.body.classList.toggle(
      "native-hang",
      $("protrusion").checked && $("hangpunct").value !== "off",
    );
  }
  $("protrusion").addEventListener("change", syncHangPunct);
  let sampleGeneration = 0;
  $("sample").addEventListener("change", async () => {
    const generation = ++sampleGeneration;
    await loadFontsForState();
    if (generation !== sampleGeneration) return;
    controller?.destroy();
    controller = null;
    setSample();
    await apply();
  });
  function syncBrowserLabel() {
    $("browser-label").textContent = $("pretty").checked ? "Browser (+ pretty)" : "Browser";
  }
  $("pretty").addEventListener("change", () => {
    native.classList.toggle("pretty", $("pretty").checked);
    syncBrowserLabel();
    scheduleUpdate();
  });
  $("rulers").addEventListener("change", () => {
    document.body.classList.toggle("rulers", $("rulers").checked);
    scheduleUpdate();
  });
  $("deviation").addEventListener("change", () => {
    scheduleUpdate();
  });
  $("blur").addEventListener("change", () => {
    document.body.classList.toggle("blur-mode", $("blur").checked);
  });
  function setTheme(value) {
    const theme = ["light", "dark"].includes(value) ? value : "system";
    $("theme").value = theme;
    document.documentElement.dataset.theme = theme;
    for (const option of ["system", "light", "dark"]) {
      $("theme-" + option).setAttribute("aria-pressed", String(theme === option));
    }
  }
  for (const theme of ["system", "light", "dark"]) {
    $("theme-" + theme).addEventListener("click", () => {
      setTheme(theme);
      $("theme").dispatchEvent(new Event("change", { bubbles: true }));
    });
  }
  let flickerHintShown = false;
  let flickerHintTimer = 0;
  function hideFlickerHint() {
    clearTimeout(flickerHintTimer);
    $("flicker-hint").removeAttribute("data-visible");
    $("flicker-hint").setAttribute("aria-hidden", "true");
  }
  function showFlickerHintOnce() {
    if (flickerHintShown) return;
    flickerHintShown = true;
    $("flicker-hint").setAttribute("data-visible", "");
    $("flicker-hint").setAttribute("aria-hidden", "false");
    flickerHintTimer = window.setTimeout(hideFlickerHint, 5000);
  }
  function setView(v) {
    $("view").value = v;
    syncMeasureLimit(viewMeasures[v]);
    applyMeasure();
    document.body.classList.toggle("flicker-mode", v === "flicker");
    if (v !== "flicker") document.body.classList.remove("show-browser");
    if (v === "flicker") showFlickerHintOnce();
    else hideFlickerHint();
    $("view-side").setAttribute("aria-pressed", String(v === "side"));
    $("view-flicker").setAttribute("aria-pressed", String(v === "flicker"));
    // Synchronous: entering flicker paints aligned on the first frame
    // (leaving clears the stacking margins the same way).
    alignStack();
    scheduleUpdate();
  }
  for (const [btn, v] of [["view-side", "side"], ["view-flicker", "flicker"]]) {
    $(btn).addEventListener("click", () => {
      setView(v);
      $("view").dispatchEvent(new Event("change", { bubbles: true })); // persist
    });
  }
  // Press-and-hold (mouse or touch) anywhere on the comparison shows the
  // browser rendering; interactive elements keep their normal behavior.
  let holdStartedAt = 0;
  let holdEndedAt = 0;
  let heldFor = 0;
  const holdEnd = () => {
    if (document.body.classList.contains("show-browser")) {
      holdEndedAt = performance.now();
      heldFor = holdEndedAt - holdStartedAt;
    }
    document.body.classList.remove("show-browser");
  };
  window.addEventListener("pointerdown", (e) => {
    if (!document.body.classList.contains("flicker-mode")) return;
    // Primary button (or touch/pen) only: a right-click must open the
    // context menu over the current layer, not flash the browser layer
    // underneath it.
    if (e.button !== 0) return;
    const t = e.target;
    // Links stay inside the hold region (a quick tap still navigates; see
    // the click guard below) — everything else interactive keeps its
    // normal behavior.
    if (t.closest("#dock, select, input, textarea, button, [popover]") !== null) {
      return;
    }
    holdStartedAt = performance.now();
    document.body.classList.add("show-browser");
    e.preventDefault(); // no text-selection drag while comparing
  });
  window.addEventListener("pointerup", holdEnd);
  window.addEventListener("pointercancel", holdEnd);
  window.addEventListener("blur", holdEnd);
  // A LONG hold that happened to start on a link must not navigate on
  // release; a quick tap (< 250ms) behaves as a normal link click.
  window.addEventListener(
    "click",
    (e) => {
      if (!document.body.classList.contains("flicker-mode")) return;
      if (e.target.closest("a") === null) return;
      if (heldFor > 250 && performance.now() - holdEndedAt < 350) {
        e.preventDefault();
        e.stopImmediatePropagation();
      }
    },
    true,
  );
  // No context menu from a touch long-press WHILE a hold is active — a
  // menu popping mid-comparison is disruptive. Idle flicker keeps normal
  // right-click behavior (holds only start on the primary button, so a
  // right-click never engages the swap).
  window.addEventListener("contextmenu", (e) => {
    if (!document.body.classList.contains("flicker-mode")) return;
    if (document.body.classList.contains("show-browser")) e.preventDefault();
  });
  // Nor accidental link drags mid-hold.
  document.querySelector(".panes").addEventListener("dragstart", (e) => {
    if (document.body.classList.contains("flicker-mode")) e.preventDefault();
  });
  // Width changes exercise the ResizeObserver fast path — no re-justify;
  // metrics and overlays recalculate live with the drag.
  $("measure").addEventListener("input", () => {
    const view = $("view").value === "flicker" ? "flicker" : "side";
    viewMeasures[view] = Number($("measure").value);
    applyMeasure();
    scheduleUpdate();
  });
  window.addEventListener("resize", () => {
    const view = $("view").value === "flicker" ? "flicker" : "side";
    syncMeasureLimit(viewMeasures[view]);
    applyMeasure();
    scheduleUpdate();
  });
  // (No scroll handling needed: nothing is layout-skipped, so the
  // geometry the flicker alignment pinned to is stable while scrolling.)
  syncMeasureLimit(viewMeasures[initialView]);

  // Expansion needs a responsive variable-width (wdth) axis; gray the
  // toggle out (with an explanation) for fonts that lack one, probed the
  // same way the library calibrates: measure at two font-stretch values.
  async function syncExpansionAvailability() {
    const family = $("font").value;
    try {
      await document.fonts.load("16px " + family);
    } catch { /* generic families resolve regardless */ }
    if (family !== $("font").value) return; // stale: font changed again
    const span = document.createElement("span");
    span.style.cssText =
      "position:absolute;visibility:hidden;white-space:pre;font-size:16px;font-family:" + family;
    span.textContent = "Sphinx of black quartz, judge my vow";
    document.body.append(span);
    const base = span.getBoundingClientRect().width;
    span.style.fontStretch = "125%";
    const wide = span.getBoundingClientRect().width;
    span.remove();
    const supported = Math.abs(wide - base) > 0.5;
    $("expansion").disabled = !supported;
    $("expansion-info").hidden = supported;
    if (!supported) {
      const name = $("font").selectedOptions[0].textContent.trim();
      $("expansion-note").textContent =
        name + " has no variable-width (wdth) axis, so glyph expansion has no effect in this font.";
    }
  }

  // Popovers open in the top layer, centered by default; anchor them to
  // their (i) buttons instead (clamped to the viewport).
  for (const [btnId, popId] of [
    ["expansion-info", "expansion-note"],
    ["hangpunct-info", "hangpunct-note"],
    ["width-info", "width-note"],
  ]) {
    $(popId).addEventListener("toggle", (e) => {
      if (e.newState !== "open") return;
      const pop = $(popId);
      const r = $(btnId).getBoundingClientRect();
      pop.style.position = "fixed";
      const w = pop.getBoundingClientRect().width;
      pop.style.left = Math.max(8, Math.min(r.left, window.innerWidth - w - 8)) + "px";
      pop.style.top = Math.max(8, r.top - pop.getBoundingClientRect().height - 8) + "px";
    });
  }

  $("reset").addEventListener("click", () => {
    try {
      localStorage.removeItem(PARAM_STORE);
    } catch { /* nothing to clear */ }
    for (const id of PARAM_IDS) {
      const el = $(id);
      if (el.type === "checkbox") el.checked = el.defaultChecked;
      else if (el.tagName === "SELECT") {
        const def = [...el.options].find((o) => o.defaultSelected) ?? el.options[0];
        el.value = def.value;
      } else {
        el.value = el.defaultValue;
      }
    }
    // Fully fresh-load semantics: window-derived defaults, not static ones.
    const sideMeasure = defaultMeasureForWindow();
    viewMeasures.side = sideMeasure;
    viewMeasures.flicker = defaultFlickerMeasure();
    $("view").value = "side";
    syncMeasureLimit(viewMeasures.side);
    applyMeasure();
    syncSideEffects();
    setSample();
    apply();
  });

  function saveParams() {
    const state = {};
    for (const id of PARAM_IDS) {
      const el = $(id);
      state[id] = el.type === "checkbox" ? el.checked : el.value;
    }
    state.measureByView = { ...viewMeasures };
    try {
      localStorage.setItem(PARAM_STORE, JSON.stringify(state));
    } catch { /* private mode / quota: settings just won't persist */ }
  }
  for (const id of PARAM_IDS) {
    $(id).addEventListener("change", saveParams);
    $(id).addEventListener("input", saveParams);
  }

  // Side effects of control state that only change handlers normally set;
  // run after persistence restore and after reset.
  function syncSideEffects() {
    syncHangPunct();
    syncLastLineOut();
    native.classList.toggle("pretty", $("pretty").checked);
    document.body.classList.toggle("blur-mode", $("blur").checked);
    setView($("view").value === "flicker" ? "flicker" : "side");
    setTheme($("theme").value);
    syncBrowserLabel();
    document.body.classList.toggle("rulers", $("rulers").checked);
  }
  syncSideEffects();

  // The metrics tables hold placeholder rows from the start, so opening
  // the dock never pops in a table: the first analysis (settle-scheduled
  // on open) swaps the dashes for values in place.
  {
    const mk = (label) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${label}</td><td>–</td><td>–</td>`;
      return tr;
    };
    const [lineBody, spacingBody] = document.querySelectorAll("#metrics tbody");
    lineBody.replaceChildren(...LINE_LABELS.map(mk));
    spacingBody.replaceChildren(...SPACING_LABELS.map(mk));
    document.getElementById("metrics").hidden = false;
  }

  // Bottom dock: collapsed by default, no persistence.
  $("dock-toggle").addEventListener("click", () => {
    const body = $("dock-body");
    body.hidden = !body.hidden;
    const expanded = !body.hidden;
    $("dock-toggle").setAttribute("aria-expanded", String(expanded));
    $("dock-toggle").textContent = `controls & metrics ${expanded ? "▾" : "▴"}`;
    // Analysis is skipped while the dock is closed — refresh on reveal.
    if (expanded) scheduleUpdate();
  });

  async function initialize() {
    await Promise.all([loadFontFamily("'Junicode'"), loadFontsForState()]);
    setSample();
    await apply();
    clearTimeout(window.fontGateTimeout);
    document.documentElement.classList.remove("fonts-loading");
  }
  initialize().catch((error) => {
    clearTimeout(window.fontGateTimeout);
    document.documentElement.classList.remove("fonts-loading");
    console.error(error);
  });
</script>
</body>
</html>
