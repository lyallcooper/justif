name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # The release body is the tag's section of CHANGELOG.md, so the
      # changelog stays the single source of release notes (npm version is
      # only run after the changelog entry is committed).
      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver " " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No CHANGELOG.md section for $VERSION" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "justif ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md
