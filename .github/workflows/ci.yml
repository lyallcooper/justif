name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # e2e runs against the freshly built dist across all three engines
      # (the suite includes sub-0.5px flushness geometry and a perf budget).
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
